name: 🎮 Shadow Village 3D – Twin Stick iOS Game

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Export IPA
    runs-on: macos-14
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Install Build Tools
        run: |
          brew install xcodegen
          gem install xcpretty --no-document 2>/dev/null || true

      - name: Create Project Directories
        run: |
          mkdir -p GameHub/Sources/Input
          mkdir -p GameHub/Sources

      # ── AppDelegate ──────────────────────────────────────────────────────────
      - name: Create AppDelegate.swift
        run: |
          cat << 'EOF' > GameHub/Sources/AppDelegate.swift
          import UIKit
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(
                  _ application: UIApplication,
                  didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
              ) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = GameViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

      # ── Input System: PS5 DualSense Virtual Controller ───────────────────────
      - name: Write Input Controller System
        run: |
          cat << 'EOF' > GameHub/Sources/Input/ControllerInput.swift
          import GameController
          import CoreHaptics
          import Foundation

          class ControllerInput: ObservableObject {
              static let shared = ControllerInput()
              
              @Published var leftStick: CGPoint = .zero
              @Published var rightStick: CGPoint = .zero
              @Published var pressedButtons: Set<String> = []
              
              private var hapticEngine: CHHapticEngine?
              private var gcController: GCVirtualController?
              
              private init() {
                  setupHaptics()
                  setupVirtualController()
              }
              
              private func setupVirtualController() {
                  let config = GCVirtualController.Configuration()
                  config.elements = [
                      GCInputLeftThumbstick,
                      GCInputRightThumbstick,
                      GCInputButtonA,
                      GCInputButtonB,
                      GCInputButtonX,
                      GCInputButtonY
                  ]
                  
                  gcController = GCVirtualController(configuration: config)
                  gcController?.connect { [weak self] error in
                      if let error = error {
                          print("Failed to connect virtual controller: \(error.localizedDescription)")
                          return
                      }
                      self?.setupInputHandlers()
                  }
              }
              
              private func setupInputHandlers() {
                  guard let controller = GCController.controllers().first?.extendedGamepad else { return }
                  
                  controller.leftThumbstick.valueChangedHandler = { [weak self] _, x, y in
                      DispatchQueue.main.async {
                          self?.leftStick = CGPoint(x: CGFloat(x), y: CGFloat(y))
                      }
                  }
                  
                  controller.rightThumbstick.valueChangedHandler = { [weak self] _, x, y in
                      DispatchQueue.main.async {
                          self?.rightStick = CGPoint(x: CGFloat(x), y: CGFloat(y))
                      }
                  }
                  
                  let buttonMap: [String: GCControllerButtonInput] = [
                      "Cross": controller.buttonA,
                      "Circle": controller.buttonB,
                      "Square": controller.buttonX,
                      "Triangle": controller.buttonY
                  ]
                  
                  for (name, buttonInput) in buttonMap {
                      buttonInput.valueChangedHandler = { [weak self] _, _, isPressed in
                          DispatchQueue.main.async {
                              if isPressed {
                                  self?.pressedButtons.insert(name)
                                  self?.triggerButtonHaptic()
                              } else {
                                  self?.pressedButtons.remove(name)
                              }
                          }
                      }
                  }
              }
              
              private func setupHaptics() {
                  guard CHHapticEngine.capabilitiesForHardware().supportsHaptics else { return }
                  hapticEngine = try? CHHapticEngine()
                  try? hapticEngine?.start()
              }
              
              func triggerButtonHaptic(intensity: Float = 0.7) {
                  guard let engine = hapticEngine else { return }
                  let event = CHHapticEvent(
                      eventType: .hapticTransient,
                      parameters: [
                          CHHapticEventParameter(parameterID: .hapticIntensity, value: intensity),
                          CHHapticEventParameter(parameterID: .hapticSharpness, value: 0.5)
                      ],
                      relativeTime: 0
                  )
                  guard let pattern = try? CHHapticPattern(events: [event], parameters: []) else { return }
                  let player = try? engine.makePlayer(with: pattern)
                  try? player?.start(atTime: CHHapticTimeImmediate)
              }
          }
          EOF

      # ── Types ────────────────────────────────────────────────────────────────
      - name: Create Types.swift
        run: |
          cat << 'EOF' > GameHub/Sources/Types.swift
          import UIKit
          struct PhysicsMask {
              static let none:   Int = 0
              static let player: Int = 1 << 0
              static let enemy:  Int = 1 << 1
              static let bullet: Int = 1 << 2
              static let wall:   Int = 1 << 3
              static let ground: Int = 1 << 4
          }
          enum EnemyKind {
              case walker, brute, runner, cultist, boss
              var health: Float {
                  switch self {
                  case .walker:  return 100
                  case .brute:   return 350
                  case .runner:  return 60
                  case .cultist: return 90
                  case .boss:    return 1500
                  }
              }
              var speed: Float {
                  switch self {
                  case .walker:  return 2.5
                  case .brute:   return 1.3
                  case .runner:  return 4.8
                  case .cultist: return 2.0
                  case .boss:    return 1.8
                  }
              }
              var damage: Float {
                  switch self {
                  case .walker:  return 12
                  case .brute:   return 35
                  case .runner:  return 8
                  case .cultist: return 20
                  case .boss:    return 50
                  }
              }
              var attackRange: Float {
                  switch self {
                  case .walker:  return 1.1
                  case .brute:   return 1.5
                  case .runner:  return 0.9
                  case .cultist: return 1.1
                  case .boss:    return 2.2
                  }
              }
              var scoreValue: Int {
                  switch self {
                  case .walker:  return 100
                  case .brute:   return 300
                  case .runner:  return 150
                  case .cultist: return 200
                  case .boss:    return 3000
                  }
              }
              var attackInterval: TimeInterval { return self == .boss ? 0.8 : 1.4 }
              var radius: Float {
                  switch self {
                  case .walker:  return 0.35
                  case .brute:   return 0.60
                  case .runner:  return 0.28
                  case .cultist: return 0.33
                  case .boss:    return 1.10
                  }
              }
              var height: Float { return radius * 4.0 }
              var bodyColor: UIColor {
                  switch self {
                  case .walker:  return UIColor(red: 0.45, green: 0.25, blue: 0.15, alpha: 1)
                  case .brute:   return UIColor(red: 0.35, green: 0.08, blue: 0.06, alpha: 1)
                  case .runner:  return UIColor(red: 0.50, green: 0.10, blue: 0.45, alpha: 1)
                  case .cultist: return UIColor(red: 0.18, green: 0.00, blue: 0.25, alpha: 1)
                  case .boss:    return UIColor(red: 0.60, green: 0.00, blue: 0.00, alpha: 1)
                  }
              }
          }
          EOF

      # ── HUDOverlay ───────────────────────────────────────────────────────────
      - name: Create HUDOverlay.swift
        run: |
          cat << 'EOF' > GameHub/Sources/HUDOverlay.swift
          import UIKit
          class HUDOverlay: UIView {
              private let hpBg      = UIView()
              private let hpBar     = UIView()
              private let ammoLbl   = UILabel()
              private let scoreLbl  = UILabel()
              private let waveLbl   = UILabel()
              private let msgLbl    = UILabel()
              let renewBtn  = UIButton(type: .system)
              let barW: CGFloat = 220
              
              var onRenewPressed: (() -> Void)?

              override init(frame: CGRect) {
                  super.init(frame: frame)
                  buildUI()
              }
              required init?(coder: NSCoder) { fatalError() }
              
              private func customFont(_ size: CGFloat, bold: Bool = false) -> UIFont {
                  return bold ? UIFont.systemFont(ofSize: size, weight: .bold) : UIFont.systemFont(ofSize: size, weight: .regular)
              }
              
              private func buildUI() {
                  hpBg.frame            = CGRect(x: 20, y: 20, width: barW + 4, height: 14)
                  hpBg.backgroundColor  = UIColor(white: 0.05, alpha: 0.6)
                  hpBg.layer.cornerRadius = 7
                  hpBg.layer.borderColor = UIColor(white: 1.0, alpha: 0.15).cgColor
                  hpBg.layer.borderWidth = 1
                  addSubview(hpBg)
                  
                  hpBar.frame             = CGRect(x: 22, y: 22, width: barW, height: 10)
                  hpBar.backgroundColor   = UIColor(red: 0.00, green: 0.90, blue: 0.45, alpha: 1.0)
                  hpBar.layer.cornerRadius = 5
                  addSubview(hpBar)
                  
                  scoreLbl.frame            = CGRect(x: bounds.width - 240, y: 20, width: 220, height: 26)
                  scoreLbl.autoresizingMask = [.flexibleLeftMargin]
                  scoreLbl.text             = "SCORE // 000000"
                  scoreLbl.textColor        = UIColor(white: 0.85, alpha: 1.0)
                  scoreLbl.font             = customFont(16, bold: true)
                  scoreLbl.textAlignment    = .right
                  addSubview(scoreLbl)
                  
                  waveLbl.frame            = CGRect(x: 0, y: 20, width: bounds.width, height: 26)
                  waveLbl.autoresizingMask = [.flexibleWidth]
                  waveLbl.text             = "PHASE 00"
                  waveLbl.textColor        = UIColor(red: 0.9, green: 0.2, blue: 0.2, alpha: 1.0)
                  waveLbl.font             = customFont(15, bold: true)
                  waveLbl.textAlignment    = .center
                  addSubview(waveLbl)
                  
                  ammoLbl.frame            = CGRect(x: bounds.width - 200, y: bounds.height - 65, width: 180, height: 45)
                  ammoLbl.autoresizingMask = [.flexibleLeftMargin, .flexibleTopMargin]
                  ammoLbl.text             = "AMMO: ∞"
                  ammoLbl.textColor        = UIColor(red: 0.0, green: 1.0, blue: 0.8, alpha: 1.0)
                  ammoLbl.font             = customFont(28, bold: true)
                  ammoLbl.textAlignment    = .right
                  addSubview(ammoLbl)
                  
                  msgLbl.frame            = CGRect(x: 0, y: bounds.height * 0.35, width: bounds.width, height: 50)
                  msgLbl.autoresizingMask = [.flexibleWidth, .flexibleTopMargin, .flexibleBottomMargin]
                  msgLbl.textColor        = .white
                  msgLbl.font             = customFont(26, bold: true)
                  msgLbl.textAlignment    = .center
                  msgLbl.alpha            = 0
                  addSubview(msgLbl)
                  
                  // RENEW BUTTON Setup
                  renewBtn.frame = CGRect(x: bounds.width/2 - 100, y: bounds.height * 0.55, width: 200, height: 50)
                  renewBtn.autoresizingMask = [.flexibleLeftMargin, .flexibleRightMargin, .flexibleTopMargin, .flexibleBottomMargin]
                  renewBtn.setTitle("RENEW SYSTEM (RESTART)", for: .normal)
                  renewBtn.titleLabel?.font = customFont(14, bold: true)
                  renewBtn.setTitleColor(.black, for: .normal)
                  renewBtn.backgroundColor = UIColor(red: 0.0, green: 1.0, blue: 0.5, alpha: 1.0)
                  renewBtn.layer.cornerRadius = 8
                  renewBtn.isHidden = true
                  renewBtn.addTarget(self, action: #selector(renewTapped), for: .touchUpInside)
                  addSubview(renewBtn)
                  
                  addSubview(makeCrosshair())
              }
              
              @objc private func renewTapped() {
                  onRenewPressed?()
              }
              
              private func makeCrosshair() -> UIView {
                  let s: CGFloat = 14, g: CGFloat = 4, t: CGFloat = 1.5
                  let w = bounds.width / 2, h = bounds.height / 2
                  let col = UIColor(red: 0.0, green: 0.8, blue: 0.8, alpha: 0.7)
                  let container = UIView(frame: bounds)
                  container.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  container.isUserInteractionEnabled = false
                  func bar(_ f: CGRect) -> UIView {
                      let b = UIView(frame: f)
                      b.backgroundColor = col
                      return b
                  }
                  container.addSubview(bar(CGRect(x: w - s - g / 2, y: h - t / 2, width: s, height: t)))
                  container.addSubview(bar(CGRect(x: w + g / 2,     y: h - t / 2, width: s, height: t)))
                  container.addSubview(bar(CGRect(x: w - t / 2,     y: h - s - g / 2, width: t, height: s)))
                  container.addSubview(bar(CGRect(x: w - t / 2,     y: h + g / 2, width: t, height: s)))
                  return container
              }
              
              func update(health: Float, maxHealth: Float, score: Int, wave: Int) {
                  let ratio = CGFloat(max(0, health / maxHealth))
                  UIView.animate(withDuration: 0.15) { self.hpBar.frame.size.width = self.barW * ratio }
                  hpBar.backgroundColor = ratio > 0.5 
                      ? UIColor(red: 0.00, green: 0.85, blue: 0.40, alpha: 1.0)
                      : ratio > 0.25 
                      ? UIColor(red: 0.95, green: 0.60, blue: 0.00, alpha: 1.0)
                      : UIColor(red: 0.95, green: 0.10, blue: 0.10, alpha: 1.0)
                  
                  scoreLbl.text     = String(format: "SCORE // %06d", score)
                  waveLbl.text      = String(format: "PHASE %02d", wave)
              }
              
              func showMessage(_ text: String, color: UIColor = .white, duration: TimeInterval = 2.0) {
                  msgLbl.text      = text.uppercased()
                  msgLbl.textColor = color
                  msgLbl.alpha     = 0
                  msgLbl.transform = CGAffineTransform(scaleX: 0.9, y: 0.9)
                  UIView.animate(withDuration: 0.2) {
                      self.msgLbl.alpha     = 1
                      self.msgLbl.transform = .identity
                  } completion: { _ in
                      if duration > 0 {
                          UIView.animate(withDuration: 0.3, delay: duration - 0.3) {
                              self.msgLbl.alpha = 0
                          }
                      }
                  }
              }
              
              func clearMessage() {
                  msgLbl.alpha = 0
              }
          }
          EOF

      # ── EnemyNode ────────────────────────────────────────────────────────────
      - name: Create EnemyNode.swift
        run: |
          cat << 'EOF' > GameHub/Sources/EnemyNode.swift
          import SceneKit
          import UIKit
          class EnemyNode: SCNNode {
              let kind:    EnemyKind
              var hp:      Float
              var isAlive: Bool = true
              var lastAttackTime: TimeInterval = 0
              private var bodyMeshNode: SCNNode!
              init(kind: EnemyKind) {
                  self.kind = kind
                  self.hp   = kind.health
                  super.init()
                  buildMesh()
                  buildPhysics()
              }
              required init?(coder: NSCoder) { fatalError() }
              private func buildMesh() {
                  let capsule = SCNCapsule(capRadius: CGFloat(kind.radius), height: CGFloat(kind.height))
                  let mat = SCNMaterial()
                  mat.diffuse.contents = kind.bodyColor
                  mat.lightingModel    = .lambert
                  capsule.materials    = [mat]
                  bodyMeshNode          = SCNNode(geometry: capsule)
                  bodyMeshNode.position = SCNVector3(0, CGFloat(kind.height * 0.5), 0)
                  addChildNode(bodyMeshNode)
                  for side: Float in [-1, 1] {
                      let eyeGeo = SCNSphere(radius: CGFloat(kind.radius * 0.2))
                      let eyeMat = SCNMaterial()
                      eyeMat.diffuse.contents  = UIColor(red: 0.95, green: 0.05, blue: 0.05, alpha: 1)
                      eyeMat.emission.contents = UIColor(red: 0.6, green: 0, blue: 0, alpha: 1)
                      eyeMat.lightingModel     = .constant
                      eyeGeo.materials = [eyeMat]
                      let eye = SCNNode(geometry: eyeGeo)
                      eye.position = SCNVector3(side * kind.radius * 0.4, kind.height * 0.82, -(kind.radius * 0.75))
                      addChildNode(eye)
                  }
                  if kind == .boss {
                      let crown = SCNTorus(ringRadius: CGFloat(kind.radius * 0.85), pipeRadius: 0.10)
                      let crownMat = SCNMaterial()
                      crownMat.diffuse.contents  = UIColor(red: 1, green: 0.8, blue: 0, alpha: 1)
                      crownMat.emission.contents = UIColor(red: 0.6, green: 0.4, blue: 0, alpha: 1)
                      crownMat.lightingModel     = .constant
                      crown.materials = [crownMat]
                      let crownNode = SCNNode(geometry: crown)
                      crownNode.position = SCNVector3(0, CGFloat(kind.height + 0.3), 0)
                      crownNode.runAction(SCNAction.repeatForever(
                          SCNAction.rotateBy(x: 0, y: .pi * 2, z: 0, duration: 2.5)
                      ))
                      addChildNode(crownNode)
                  }
              }
              private func buildPhysics() {
                  let geo   = SCNCapsule(capRadius: CGFloat(kind.radius), height: CGFloat(kind.height))
                  let shape = SCNPhysicsShape(geometry: geo, options: nil)
                  let body  = SCNPhysicsBody(type: .kinematic, shape: shape)
                  body.categoryBitMask    = PhysicsMask.enemy
                  body.contactTestBitMask = PhysicsMask.bullet | PhysicsMask.player
                  body.collisionBitMask   = PhysicsMask.wall | PhysicsMask.ground
                  physicsBody = body
              }
              func takeDamage(_ amount: Float) {
                  guard isAlive else { return }
                  hp -= amount
                  flashWhite()
                  if hp <= 0 { isAlive = false; die() }
              }
              private func flashWhite() {
                  let whiteMat = SCNMaterial()
                  whiteMat.diffuse.contents = UIColor.white
                  whiteMat.lightingModel    = .constant
                  let origMat = SCNMaterial()
                  origMat.diffuse.contents  = kind.bodyColor
                  origMat.lightingModel     = .lambert
                  bodyMeshNode.geometry?.materials = [whiteMat]
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.07) { [weak self] in
                      self?.bodyMeshNode.geometry?.materials = [origMat]
                  }
              }
              private func die() {
                  physicsBody = nil
                  runAction(SCNAction.sequence([
                      SCNAction.group([
                          SCNAction.rotateBy(x: 0, y: 0, z: .pi * 1.5, duration: 0.45),
                          SCNAction.scale(to: 0.02, duration: 0.45),
                          SCNAction.fadeOut(duration: 0.45)
                      ]),
                      SCNAction.removeFromParentNode()
                  ]))
              }
              func moveToward(target: SCNVector3, dt: Float) {
                  guard isAlive else { return }
                  let dx   = target.x - position.x
                  let dz   = target.z - position.z
                  let dist = sqrt(dx * dx + dz * dz)
                  guard dist > kind.attackRange * 0.8 else { return }
                  let spd = kind.speed * dt
                  position.x += dx / dist * spd
                  position.z += dz / dist * spd
                  eulerAngles.y = atan2(dx, dz)
              }
              func distanceTo(_ p: SCNVector3) -> Float {
                  let dx = position.x - p.x
                  let dz = position.z - p.z
                  return sqrt(dx * dx + dz * dz)
              }
              func canAttack(at t: TimeInterval) -> Bool {
                  return t - lastAttackTime >= kind.attackInterval
              }
          }
          EOF

      # ── GameViewController ──────────────────────────────────────────────────
      - name: Create GameViewController.swift
        run: |
          cat << 'EOF' > GameHub/Sources/GameViewController.swift
          import UIKit
          import SceneKit

          class GameViewController: UIViewController, SCNSceneRendererDelegate, SCNPhysicsContactDelegate {
              
              private var sceneView: SCNView!
              private var scene: SCNScene!
              private var hud: HUDOverlay!
              
              private var playerNode: SCNNode!
              private var cameraNode: SCNNode!
              private var enemies: [EnemyNode] = []
              
              private var score = 0
              private var currentWave = 0
              private var playerHP: Float = 100.0
              private let maxPlayerHP: Float = 100.0
              private var isGameOver = false
              
              private var lastFireTime: TimeInterval = 0
              private let fireRate: TimeInterval = 0.15
              private var lastUpdateTime: TimeInterval = 0
              private let input = ControllerInput.shared
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  
                  setupEngine()
                  setupWorld()
                  setupPlayer()
                  setupHUD()
                  
                  startNextWave()
              }
              
              override var prefersStatusBarHidden: Bool { return true }
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { return .landscape }
              
              private func setupEngine() {
                  sceneView = SCNView(frame: view.bounds)
                  sceneView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  sceneView.backgroundColor = .black
                  sceneView.delegate = self
                  sceneView.isPlaying = true
                  view.addSubview(sceneView)
                  
                  scene = SCNScene()
                  scene.physicsWorld.gravity = SCNVector3(0, -9.8, 0)
                  scene.physicsWorld.contactDelegate = self
                  sceneView.scene = scene
              }
              
              private func setupWorld() {
                  // আলো অপ্টিমাইজ করা হয়েছে (যাতে অতিরিক্ত অন্ধকার না লাগে এবং ক্যারেক্টার ও গ্রাউন্ড সুন্দর দেখা যায়)
                  let ambLight = SCNLight()
                  ambLight.type = .ambient
                  ambLight.color = UIColor(white: 0.28, alpha: 1.0) // আম্বিয়েন্ট লাইট বাড়িয়ে ভিজিবিলিটি ক্লিয়ার করা হয়েছে
                  let ambNode = SCNNode()
                  ambNode.light = ambLight
                  scene.rootNode.addChildNode(ambNode)
                  
                  let dirLight = SCNLight()
                  dirLight.type = .directional
                  dirLight.color = UIColor(red: 0.65, green: 0.65, blue: 0.85, alpha: 1.0) 
                  dirLight.intensity = 1000 // ডিরেকশনাল লাইট ১০০০ লাক্স করা হয়েছে সিনেমাটিক ক্লিয়ারিটির জন্য
                  dirLight.castsShadow = true
                  let dirNode = SCNNode()
                  dirNode.light = dirLight
                  dirNode.position = SCNVector3(15, 30, 15)
                  dirNode.look(at: SCNVector3(0, 0, 0))
                  scene.rootNode.addChildNode(dirNode)
                  
                  let floorGeo = SCNFloor()
                  floorGeo.reflectivity = 0.05
                  let floorMat = SCNMaterial()
                  floorMat.diffuse.contents = UIColor(white: 0.15, alpha: 1.0)
                  floorGeo.materials = [floorMat]
                  let floorNode = SCNNode(geometry: floorGeo)
                  floorNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)
                  floorNode.physicsBody?.categoryBitMask = PhysicsMask.ground
                  scene.rootNode.addChildNode(floorNode)
                  
                  let wallGeo = SCNBox(width: 44, height: 6, length: 2, chamferRadius: 0)
                  let wallMat = SCNMaterial()
                  wallMat.diffuse.contents = UIColor(white: 0.25, alpha: 1.0)
                  wallGeo.materials = [wallMat]
                  
                  let northWall = SCNNode(geometry: wallGeo)
                  northWall.position = SCNVector3(0, 3, -22)
                  northWall.physicsBody = SCNPhysicsBody(type: .static, shape: nil)
                  northWall.physicsBody?.categoryBitMask = PhysicsMask.wall
                  scene.rootNode.addChildNode(northWall)
                  
                  let southWall = SCNNode(geometry: wallGeo)
                  southWall.position = SCNVector3(0, 3, 22)
                  southWall.physicsBody = SCNPhysicsBody(type: .static, shape: nil)
                  southWall.physicsBody?.categoryBitMask = PhysicsMask.wall
                  scene.rootNode.addChildNode(southWall)
              }
              
              private func setupPlayer() {
                  let capsule = SCNCapsule(capRadius: 0.4, height: 1.7)
                  let pMat = SCNMaterial()
                  pMat.diffuse.contents = UIColor(red: 0.0, green: 0.6, blue: 0.9, alpha: 1.0)
                  capsule.materials = [pMat]
                  
                  playerNode = SCNNode(geometry: capsule)
                  playerNode.position = SCNVector3(0, 0.85, 0)
                  
                  let pBody = SCNPhysicsBody(type: .dynamic, shape: SCNPhysicsShape(geometry: capsule, options: nil))
                  pBody.allowsResting = true
                  pBody.angularVelocityFactor = SCNVector3(0, 1, 0)
                  pBody.categoryBitMask = PhysicsMask.player
                  pBody.collisionBitMask = PhysicsMask.wall | PhysicsMask.ground | PhysicsMask.enemy
                  pBody.contactTestBitMask = PhysicsMask.enemy
                  playerNode.physicsBody = pBody
                  scene.rootNode.addChildNode(playerNode)
                  
                  cameraNode = SCNNode()
                  cameraNode.camera = SCNCamera()
                  cameraNode.camera?.zFar = 120
                  cameraNode.position = SCNVector3(0, 14, 9)
                  cameraNode.look(at: playerNode.position)
                  scene.rootNode.addChildNode(cameraNode)
              }
              
              private func startNextWave() {
                  currentWave += 1
                  hud?.showMessage("Entering Phase \(currentWave)", color: UIColor.cyan)
                  
                  let baseCount = 4 + (currentWave * 2)
                  for _ in 0..<baseCount {
                      let kinds: [EnemyKind] = [.walker, .runner, .cultist]
                      let selectedKind = kinds.randomElement() ?? .walker
                      let enemy = EnemyNode(kind: selectedKind)
                      
                      let angle = Float.random(in: 0...(.pi * 2))
                      let radius = Float.random(in: 12...19)
                      enemy.position = SCNVector3(sin(angle) * radius, 0.5, cos(angle) * radius)
                      
                      scene.rootNode.addChildNode(enemy)
                      enemies.append(enemy)
                  }
              }
              
              private func setupHUD() {
                  hud = HUDOverlay(frame: view.bounds)
                  hud.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  hud.onRenewPressed = { [weak self] in
                      self?.renewGame()
                  }
                  view.addSubview(hud)
                  refreshHUD()
              }
              
              func renderer(_ renderer: SCNSceneRenderer, updateAtTime time: TimeInterval) {
                  if isGameOver { 
                      if input.pressedButtons.contains("Cross") {
                          DispatchQueue.main.async { [weak self] in self?.renewGame() }
                      }
                      return 
                  }
                  
                  if lastUpdateTime == 0 { lastUpdateTime = time }
                  let dt = Float(time - lastUpdateTime)
                  lastUpdateTime = time
                  
                  // কন্ট্রোলার জয়স্টিক মুভমেন্ট ডিরেক্ট ফিজিক্স ভেলোসিটি ফিক্স (১০০% ওয়ার্কিং)
                  let lStick = input.leftStick
                  if lStick != .zero {
                      let speedMultiplier: Float = 7.0
                      let velX = Float(lStick.x) * speedMultiplier
                      let velZ = -Float(lStick.y) * speedMultiplier
                      
                      playerNode.physicsBody?.velocity = SCNVector3(velX, playerNode.physicsBody?.velocity.y ?? 0, velZ)
                      
                      if input.rightStick == .zero {
                          playerNode.eulerAngles.y = atan2(-velX, -velZ)
                      }
                  } else {
                      playerNode.physicsBody?.velocity.x = 0
                      playerNode.physicsBody?.velocity.z = 0
                  }
                  
                  let rStick = input.rightStick
                  if rStick != .zero {
                      playerNode.eulerAngles.y = atan2(-Float(rStick.x), Float(rStick.y))
                      if time - lastFireTime >= fireRate {
                          lastFireTime = time
                          executeShoot()
                      }
                  }
                  
                  let targetCamPos = SCNVector3(playerNode.position.x, playerNode.position.y + 14, playerNode.position.z + 9)
                  cameraNode.position.x += (targetCamPos.x - cameraNode.position.x) * 0.12
                  cameraNode.position.z += (targetCamPos.z - cameraNode.position.z) * 0.12
                  
                  enemies = enemies.filter { $0.parent != nil }
                  for enemy in enemies {
                      enemy.moveToward(target: playerNode.position, dt: dt)
                      if enemy.distanceTo(playerNode.position) <= enemy.kind.attackRange {
                          if enemy.canAttack(at: time) {
                              enemy.lastAttackTime = time
                              inflictDamageToPlayer(enemy.kind.damage)
                          }
                      }
                  }
                  
                  if enemies.isEmpty {
                      DispatchQueue.main.async { [weak self] in self?.startNextWave() }
                  }
              }
              
              private func executeShoot() {
                  let bGeo = SCNSphere(radius: 0.12)
                  let bMat = SCNMaterial()
                  bMat.diffuse.contents = UIColor.orange
                  bMat.emission.contents = UIColor.yellow
                  bMat.lightingModel = .constant
                  bGeo.materials = [bMat]
                  
                  let bullet = SCNNode(geometry: bGeo)
                  bullet.position = SCNVector3(playerNode.position.x, playerNode.position.y + 0.2, playerNode.position.z)
                  
                  let bBody = SCNPhysicsBody(type: .dynamic, shape: nil)
                  bBody.isAffectedByGravity = false
                  bBody.categoryBitMask = PhysicsMask.bullet
                  bBody.collisionBitMask = PhysicsMask.wall
                  bBody.contactTestBitMask = PhysicsMask.enemy | PhysicsMask.wall
                  bullet.physicsBody = bBody
                  
                  scene.rootNode.addChildNode(bullet)
                  
                  let angle = playerNode.eulerAngles.y
                  let forceMag: Float = 26.0
                  let fx = -sin(angle) * forceMag
                  let fz = -cos(angle) * forceMag
                  bBody.velocity = SCNVector3(fx, 0, fz)
                  
                  bullet.runAction(SCNAction.sequence([SCNAction.wait(duration: 1.5), SCNAction.removeFromParentNode()]))
              }
              
              private func inflictDamageToPlayer(_ amount: Float) {
                  playerHP = max(0, playerHP - amount)
                  DispatchQueue.main.async { [weak self] in self?.refreshHUD() }
                  if playerHP <= 0 && !isGameOver {
                      isGameOver = true
                      DispatchQueue.main.async { [weak self] in self?.triggerGameOver() }
                  }
              }
              
              private func refreshHUD() {
                  hud.update(health: playerHP, maxHealth: maxPlayerHP, score: score, wave: currentWave)
              }
              
              private func triggerGameOver() {
                  hud.showMessage("SQUAD WIPED // SYSTEM TERMINATED", color: .red, duration: 0)
                  hud.renewBtn.isHidden = false
                  playerNode.runAction(SCNAction.fadeOut(duration: 0.3))
              }
              
              private func renewGame() {
                  isGameOver = false
                  playerHP = maxPlayerHP
                  score = 0
                  currentWave = 0
                  
                  for enemy in enemies {
                      enemy.removeFromParentNode()
                  }
                  enemies.removeAll()
                  
                  playerNode.position = SCNVector3(0, 0.85, 0)
                  playerNode.physicsBody?.velocity = SCNVector3(0, 0, 0)
                  playerNode.opacity = 1.0
                  
                  hud.renewBtn.isHidden = true
                  hud.clearMessage()
                  refreshHUD()
                  
                  startNextWave()
              }
              
              func physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact) {
                  let maskA = contact.nodeA.physicsBody?.categoryBitMask ?? 0
                  let maskB = contact.nodeB.physicsBody?.categoryBitMask ?? 0
                  
                  if (maskA == PhysicsMask.bullet && maskB == PhysicsMask.enemy) {
                      handleBulletHit(bullet: contact.nodeA, enemy: contact.nodeB as? EnemyNode)
                  } else if (maskA == PhysicsMask.enemy && maskB == PhysicsMask.bullet) {
                      handleBulletHit(bullet: contact.nodeB, enemy: contact.nodeA as? EnemyNode)
                  }
              }
              
              private func handleBulletHit(bullet: SCNNode, enemy: EnemyNode?) {
                  bullet.removeFromParentNode()
                  if let e = enemy, e.isAlive {
                      e.takeDamage(34.0)
                      if !e.isAlive {
                          score += e.kind.scoreValue
                          DispatchQueue.main.async { [weak self] in self?.refreshHUD() }
                      }
                  }
              }
          }
          EOF

      # ── Project Configuration & Build System ─────────────────────────────────
      - name: Create project.yml
        run: |
          cat << 'EOF' > project.yml
          name: GameHub
          options:
            bundleIdPrefix: com.shadowvillage.game
          targets:
            GameHub:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources: [GameHub]
              settings:
                base:
                  INFOPLIST_FILE: GameHub/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.shadowvillage.game.sv3d
                  PRODUCT_NAME: GameHub
                  MARKETING_VERSION: "1.0.0"
                  CURRENT_PROJECT_VERSION: "1"
                  TARGETED_DEVICE_FAMILY: "1,2"
                  ASSETCATALOG_COMPILER_APPICON_NAME: ""
                  ARCHS: "arm64"
                  SDKROOT: "iphoneos"
          EOF

      - name: Create Info.plist
        run: |
          cat << 'EOF' > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.shadowvillage.game.sv3d</string>
              <key>CFBundleExecutable</key>
              <string>GameHub</string>
              <key>CFBundleName</key>
              <string>GameHub</string>
              <key>CFBundleDisplayName</key>
              <string>ShadowVillage3D</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string></string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
                  <string>metal</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>GCSupportedGameControllers</key>
              <array>
                  <dict>
                      <key>ProfileName</key>
                      <string>ExtendedGamepad</string>
                  </dict>
              </array>
              <key>GCRequiresControllerUserInterface</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode Project File
        run: xcodegen generate

      - name: Archive Project for Real Device (No-Sign Method)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -archivePath build/GameHub.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

      - name: Package App Bundle into Installable IPA
        run: |
          mkdir -p build/IPA_Structure/Payload
          cp -R build/GameHub.xcarchive/Products/Applications/GameHub.app build/IPA_Structure/Payload/
          cd build/IPA_Structure
          zip -q -r ../ShadowVillage3D.ipa Payload
          cd ../..
          echo "=== IPA GENERATED WITH RENEW SYSTEM & INFINITE AMMO ==="

      - name: Upload Artifact & Generate Direct Download Link
        uses: actions/upload-artifact@v4
        with:
          name: ShadowVillage3D-iOS-IPA
          path: build/ShadowVillage3D.ipa
          retention-days: 7
