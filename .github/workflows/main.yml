name: iOS CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14

    steps:
      # ── 1. ENVIRONMENT & TOOLS SETUP ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install Tools
        run: |
          brew install xcodegen
          gem install xcpretty

      - name: Create Directories
        run: mkdir -p SV3D/Sources

      # ── 2. GENERATE SOURCE FILES ────────────────────────────────────────────
      - name: AppDelegate.swift
        run: |
          cat > SV3D/Sources/AppDelegate.swift << 'SWIFT_EOF'
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = GameViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          SWIFT_EOF

      - name: Types.swift
        run: |
          cat > SV3D/Sources/Types.swift << 'SWIFT_EOF'
          import Foundation
          import UIKit

          struct PhysicsMask {
              static let none:   Int = 0
              static let player: Int = 0b1      // 1
              static let enemy:  Int = 0b10     // 2
              static let bullet: Int = 0b100    // 4
              static let wall:   Int = 0b1000   // 8
              static let ground: Int = 0b10000  // 16
              static let item:   Int = 0b100000 // 32
          }

          enum EnemyKind {
              case walker, brute, boss
              
              var health: Float {
                  switch self { case .walker: return 30; case .brute: return 120; case .boss: return 600 }
              }
              var speed: Float {
                  switch self { case .walker: return 2.2; case .brute: return 1.4; case .boss: return 1.8 }
              }
              var damage: Float {
                  switch self { case .walker: return 8; case .brute: return 22; case .boss: return 35 }
              }
              var attackRange: Float {
                  switch self { case .walker: return 1.2; case .brute: return 1.5; case .boss: return 2.5 }
              }
              var attackCooldown: TimeInterval {
                  switch self { case .walker: return 1.0; case .brute: return 1.5; case .boss: return 0.8 }
              }
              var scale: Float {
                  switch self { case .walker: return 0.8; case .brute: return 1.4; case .boss: return 2.6 }
              }
              var scoreValue: Int {
                  switch self { case .walker: return 10; case .brute: return 35; case .boss: return 200 }
              }
              var color: UIColor {
                  switch self {
                  case .walker: return UIColor(red: 0.9, green: 0.2, blue: 0.3, alpha: 1)
                  case .brute:  return UIColor(red: 0.6, green: 0.1, blue: 0.4, alpha: 1)
                  case .boss:   return UIColor(red: 1.0, green: 0.1, blue: 0.1, alpha: 1)
                  }
              }
          }
          SWIFT_EOF

      - name: JoystickView.swift
        run: |
          cat > SV3D/Sources/JoystickView.swift << 'SWIFT_EOF'
          import UIKit

          class JoystickView: UIView {
              private let baseView   = UIView()
              private let handleView = UIView()
              private let maxRadius:  CGFloat
              
              var trackingTouch: UITouch?
              private(set) var velocity = CGPoint.zero
              var isActive: Bool { return velocity != .zero }

              init(radius: CGFloat, accentColor: UIColor) {
                  self.maxRadius = radius
                  super.init(frame: CGRect(x: 0, y: 0, width: radius * 2, height: radius * 2))
                  
                  baseView.frame = bounds
                  baseView.layer.cornerRadius = radius
                  baseView.backgroundColor = UIColor(white: 1.0, alpha: 0.04)
                  baseView.layer.borderColor = accentColor.withAlphaComponent(0.25).规律 ? accentColor.withAlphaComponent(0.25).cgColor : accentColor.withAlphaComponent(0.25).cgColor
                  baseView.layer.borderWidth = 1.5
                  addSubview(baseView)
                  
                  let hRad = radius * 0.4
                  handleView.frame = CGRect(x: radius - hRad, y: radius - hRad, width: hRad * 2, height: hRad * 2)
                  handleView.layer.cornerRadius = hRad
                  handleView.backgroundColor = accentColor.withAlphaComponent(0.7)
                  handleView.layer.shadowColor = accentColor.cgColor
                  handleView.layer.shadowRadius = 6
                  handleView.layer.shadowOpacity = 0.5
                  handleView.layer.shadowOffset = .zero
                  addSubview(handleView)
              }
              
              required init?(coder: NSCoder) { fatalError() }
              
              func moveTouch(_ touch: UITouch, in targetView: UIView) {
                  let loc = touch.location(in: self)
                  let center = CGPoint(x: maxRadius, y: maxRadius)
                  
                  let dx = loc.x - center.x
                  let dy = loc.y - center.y
                  let dist = sqrt(dx * dx + dy * dy)
                  
                  if dist == 0 {
                      velocity = .zero
                      handleView.center = center
                      return
                  }
                  
                  let angle = atan2(dy, dx)
                  let clampedDist = min(dist, maxRadius)
                  
                  let hx = center.x + cos(angle) * clampedDist
                  let hy = center.y + sin(angle) * clampedDist
                  handleView.center = CGPoint(x: hx, y: hy)
                  
                  velocity = CGPoint(x: dx / maxRadius, y: dy / maxRadius)
                  if dist > maxRadius {
                      let mag = sqrt(velocity.x * velocity.x + velocity.y * velocity.y)
                      velocity.x /= mag
                      velocity.y /= mag
                  }
              }
              
              func reset() {
                  trackingTouch = nil
                  velocity = .zero
                  UIView.animate(withDuration: 0.15, delay: 0, options: .curveEaseOut) {
                      self.handleView.center = CGPoint(x: self.maxRadius, y: self.maxRadius)
                  }
              }
          }
          SWIFT_EOF

      - name: HUDOverlay.swift
        run: |
          cat > SV3D/Sources/HUDOverlay.swift << 'SWIFT_EOF'
          import UIKit

          class HUDOverlay: UIView {
              private let hpBar      = UIView()
              private let hpLabel    = UILabel()
              private let ammoLabel  = UILabel()
              private let scoreLabel = UILabel()
              private let waveLabel  = UILabel()
              private let msgLabel   = UILabel()

              override init(frame: CGRect) {
                  super.init(frame: frame)
                  isUserInteractionEnabled = false
                  setupLayout()
              }
              
              required init?(coder: NSCoder) { fatalError() }
              
              private func setupLayout() {
                  let barContainer = UIView(frame: CGRect(x: 25, y: 25, width: 220, height: 16))
                  barContainer.backgroundColor = UIColor(white: 1.0, alpha: 0.08)
                  barContainer.layer.cornerRadius = 4
                  barContainer.clipsToBounds = true
                  addSubview(barContainer)
                  
                  hpBar.frame = CGRect(x: 0, y: 0, width: 220, height: 16)
                  hpBar.backgroundColor = UIColor(red: 0.0, green: 0.9, blue: 0.6, alpha: 0.85)
                  barContainer.addSubview(hpBar)
                  
                  hpLabel.frame = CGRect(x: 25, y: 45, width: 150, height: 20)
                  style(hpLabel, size: 11, weight: .bold, color: .lightGray, text: "CORE INTEGRITY: 100%")
                  
                  ammoLabel.frame = CGRect(x: bounds.width - 200 - 25, y: 25, width: 200, height: 25)
                  ammoLabel.autoresizingMask = [.flexibleLeftMargin]
                  style(ammoLabel, size: 16, weight: .black, alignment: .right, color: .white, text: "AMMO: 30 / 90")
                  
                  scoreLabel.frame = CGRect(x: bounds.width / 2 - 100, y: 25, width: 200, height: 22)
                  scoreLabel.autoresizingMask = [.flexibleLeftMargin, .flexibleRightMargin]
                  style(scoreLabel, size: 15, weight: .medium, alignment: .center, color: UIColor(white: 0.9, alpha: 0.9), text: "INDEX: 000000")
                  
                  waveLabel.frame = CGRect(x: bounds.width / 2 - 100, y: 50, width: 200, height: 18)
                  waveLabel.autoresizingMask = [.flexibleLeftMargin, .flexibleRightMargin]
                  style(waveLabel, size: 12, weight: .bold, alignment: .center, color: UIColor.cyan.withAlphaComponent(0.8), text: "PHASE: 0")
                  
                  msgLabel.frame = CGRect(x: 50, y: bounds.height / 2 - 40, width: bounds.width - 100, height: 40)
                  msgLabel.autoresizingMask = [.flexibleTopMargin, .flexibleBottomMargin, .flexibleWidth]
                  style(msgLabel, size: 18, weight: .heavy, alignment: .center, color: .clear, text: "")
              }
              
              private func style(_ l: UILabel, size: CGFloat, weight: UIFont.Weight, alignment: NSTextAlignment = .left, color: UIColor, text: String) {
                  l.font = UIFont.systemFont(ofSize: size, weight: weight)
                  l.textAlignment = alignment
                  l.textColor = color
                  l.text = text
                  addSubview(l)
              }
              
              func update(health: Float, maxHealth: Float, ammo: Int, totalAmmo: Int, score: Int, wave: Int, isReloading: Bool) {
                  let pct = max(0, min(health / maxHealth, 1.0))
                  UIView.animate(withDuration: 0.1) {
                      self.hpBar.frame.size.width = 220 * CGFloat(pct)
                      self.hpBar.backgroundColor = pct > 0.4 ? UIColor(red: 0.0, green: 0.9, blue: 0.6, alpha: 0.85) : UIColor(red: 1.0, green: 0.2, blue: 0.3, alpha: 0.9)
                  }
                  hpLabel.text = "CORE INTEGRITY: \(Int(pct * 100))%"
                  scoreLabel.text = "INDEX: \(String(format: "%06d", score))"
                  waveLabel.text = "PHASE: \(wave)"
                  
                  if isReloading {
                      ammoLabel.text = "RE-INDEXING CHIP..."
                      ammoLabel.textColor = .orange
                  } else {
                      ammoLabel.text = "AMMO: \(ammo) / \(totalAmmo)"
                      ammoLabel.textColor = ammo == 0 ? .red : .white
                  }
              }
              
              func showMessage(_ text: String, color: UIColor, duration: TimeInterval) {
                  msgLabel.text = text
                  msgLabel.textColor = color
                  msgLabel.alpha = 0
                  msgLabel.transform = CGAffineTransform(scaleX: 0.9, y: 0.9)
                  
                  UIView.animate(withDuration: 0.25, delay: 0, options: .curveEaseOut) {
                      self.msgLabel.alpha = 1
                      self.msgLabel.transform = .identity
                  } completion: { _ in
                      UIView.animate(withDuration: 0.3, delay: duration, options: .curveEaseIn) {
                          self.msgLabel.alpha = 0
                      }
                  }
              }
          }
          SWIFT_EOF

      - name: EnemyNode.swift
        run: |
          cat > SV3D/Sources/EnemyNode.swift << 'SWIFT_EOF'
          import SceneKit
          import UIKit

          class EnemyNode: SCNNode {
              let kind: EnemyKind
              private(set) var currentHealth: Float
              private(set) var isAlive = true
              var lastAttackTime: TimeInterval = 0
              
              init(kind: EnemyKind) {
                  self.kind = kind
                  self.currentHealth = kind.health
                  super.init()
                  
                  let h = kind.scale * 1.5
                  let r = kind.scale * 0.35
                  let geo = SCNCapsule(capRadius: CGFloat(r), height: CGFloat(h))
                  let mat = SCNMaterial()
                  mat.diffuse.contents = kind.color
                  geo.materials = [mat]
                  
                  let innerNode = SCNNode(geometry: geo)
                  innerNode.position = SCNVector3(0, h/2, 0)
                  addChildNode(innerNode)
                  
                  let shape = SCNPhysicsShape(geometry: geo, options: nil)
                  let pBody = SCNPhysicsBody(type: .dynamic, shape: shape)
                  pBody.allowsResting = false
                  pBody.mass = CGFloat(kind.scale * 2.0)
                  pBody.categoryBitMask = PhysicsMask.enemy
                  pBody.contactTestBitMask = PhysicsMask.bullet | PhysicsMask.player
                  pBody.collisionBitMask = PhysicsMask.wall | PhysicsMask.ground | PhysicsMask.enemy
                  self.physicsBody = pBody
              }
              
              required init?(coder: NSCoder) { fatalError() }
              
              func moveToward(target: SCNVector3, dt: Float) {
                  guard isAlive, let pBody = physicsBody else { return }
                  let dx = target.x - position.x
                  let dz = target.z - position.z
                  let len = sqrt(dx * dx + dz * dz)
                  
                  if len > 0.1 {
                      let spd = kind.speed
                      pBody.velocity = SCNVector3((dx / len) * spd, pBody.velocity.y, (dz / len) * spd)
                      eulerAngles.y = atan2(dx, dz)
                  } else {
                      pBody.velocity = SCNVector3(0, pBody.velocity.y, 0)
                  }
              }
              
              func distanceTo(_ pos: SCNVector3) -> Float {
                  let dx = pos.x - position.x
                  let dz = pos.z - position.z
                  return sqrt(dx * dx + dz * dz)
              }
              
              func canAttack(at time: TimeInterval) -> Bool {
                  return time - lastAttackTime >= kind.attackCooldown
              }
              
              func takeDamage(_ amount: Float) {
                  guard isAlive else { return }
                  currentHealth -= amount
                  if currentHealth <= 0 {
                      isAlive = false
                      physicsBody?.contactTestBitMask = PhysicsMask.none
                      physicsBody?.collisionBitMask = PhysicsMask.none
                      physicsBody?.velocity = SCNVector3(0, 10, 0)
                      
                      runAction(.sequence([
                          .fadeOut(duration: 0.35),
                          .removeFromParentNode()
                      ]))
                  }
              }
          }
          SWIFT_EOF

      - name: GameViewController.swift
        run: |
          cat > SV3D/Sources/GameViewController.swift << 'SWIFT_EOF'
          import UIKit
          import SceneKit

          class GameViewController: UIViewController, SCNSceneRendererDelegate, SCNPhysicsContactDelegate {

              // MARK: - Core
              private var scnView: SCNView!
              private var scene:   SCNScene!

              // MARK: - Player
              private var playerNode: SCNNode!
              private var playerBody: SCNNode!
              private var cameraArm:  SCNNode!
              private var cameraNode: SCNNode!

              // MARK: - State
              private var health      : Float        = 100
              private var maxHealth   : Float        = 100
              private var ammo        : Int          = 30
              private var totalAmmo   : Int          = 90
              private var score       : Int          = 0
              private var wave        : Int          = 0
              private var isReloading : Bool         = false
              private var canShoot    : Bool         = true
              private var isGameOver  : Bool         = false
              private var waveActive  : Bool         = false
              private var bossSpawned : Bool         = false
              private var waveTimer   : TimeInterval = 3.0
              private var lastTime    : TimeInterval = 0
              private var enemies     : [EnemyNode]  = []
              private var bullets     : [SCNNode]    = []
              private var lastShotTime: TimeInterval = 0

              // MARK: - Twin Sticks
              private var moveJoystick: JoystickView!
              private var aimJoystick:  JoystickView!
              private var hudView:      HUDOverlay!
              private var cameraYaw:    Float   = 0
              private let cameraPitch:  Float   = -0.22

              private let mapHalf: Float = 30.0

              override func viewDidLoad() {
                  super.viewDidLoad()
                  setupScene()
                  buildWorld()
                  spawnPlayer()
                  setupCamera()
                  setupLighting()
                  setupHUD()
                  setupJoysticks()
                  waveTimer = 3.0
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.6) { [weak self] in
                      self?.hudView.showMessage("INCOMING ANOMALY DETECTED", color: .red, duration: 2.5)
                  }
              }

              override var prefersStatusBarHidden: Bool { return true }
              override var shouldAutorotate: Bool { return true }
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { return .landscape }
              override var prefersHomeIndicatorAutoHidden: Bool { return true }

              private func setupScene() {
                  scnView = SCNView(frame: view.bounds)
                  scnView.autoresizingMask        = [.flexibleWidth, .flexibleHeight]
                  scnView.backgroundColor         = UIColor(red: 0.02, green: 0.01, blue: 0.02, alpha: 1)
                  scnView.antialiasingMode         = .multisampling4X
                  scnView.preferredFramesPerSecond = 60
                  view.addSubview(scnView)

                  scene = SCNScene()
                  scene.background.contents        = UIColor(red: 0.04, green: 0.03, blue: 0.07, alpha: 1)
                  scene.physicsWorld.contactDelegate = self
                  scene.physicsWorld.gravity          = SCNVector3(0, -12, 0)
                  scnView.scene    = scene
                  scnView.delegate = self
                  scnView.isPlaying = true
              }

              private func buildWorld() {
                  buildGround()
                  buildBorders()
                  buildBuildings()
              }

              private func buildGround() {
                  let geo = SCNFloor()
                  let mat = SCNMaterial()
                  mat.diffuse.contents   = UIColor(red: 0.10, green: 0.09, blue: 0.12, alpha: 1)
                  mat.lightingModel      = .lambert
                  geo.materials = [mat]
                  let node = SCNNode(geometry: geo)
                  node.physicsBody = SCNPhysicsBody(type: .static, shape: nil)
                  node.physicsBody?.categoryBitMask  = PhysicsMask.ground
                  node.physicsBody?.collisionBitMask = PhysicsMask.player | PhysicsMask.enemy | PhysicsMask.bullet
                  scene.rootNode.addChildNode(node)
              }

              private func buildBorders() {
                  let h: Float = 8, t: Float = 1.5, s = mapHalf * 2
                  let walls: [(Float, Float, Float, Float, Float, Float)] = [
                      (0, h/2, -(mapHalf+t/2), s+t*2, h, t),
                      (0, h/2,  (mapHalf+t/2), s+t*2, h, t),
                      (-(mapHalf+t/2), h/2, 0, t, h, s),
                      ( (mapHalf+t/2), h/2, 0, t, h, s)
                  ]
                  for (x, y, z, w, hh, d) in walls {
                      let geo = SCNBox(width: CGFloat(w), height: CGFloat(hh), length: CGFloat(d), chamferRadius: 0)
                      let mat = SCNMaterial()
                      mat.diffuse.contents = UIColor(red: 0.12, green: 0.11, blue: 0.15, alpha: 1)
                      geo.materials = [mat]
                      let node = SCNNode(geometry: geo)
                      node.position = SCNVector3(x, y, z)
                      node.physicsBody = SCNPhysicsBody(type: .static, shape: nil)
                      node.physicsBody?.categoryBitMask  = PhysicsMask.wall
                      node.physicsBody?.collisionBitMask = PhysicsMask.player | PhysicsMask.enemy | PhysicsMask.bullet
                      scene.rootNode.addChildNode(node)
                  }
              }

              private func buildBuildings() {
                  let data: [(Float, Float, Float, Float)] = [
                      (-14, -18, 5.5, 7), (10, -16, 4.5, 6), (-8, 14, 6, 8),
                      (16,   9,  4,  6),  (-18, 4, 4, 7),    (4, 19, 5, 7),
                      (-4, -9,  4,  5),   (14, -4, 4, 6),    (0,  0, 3, 5)
                  ]
                  for (x, z, w, h) in data {
                      let geo = SCNBox(width: CGFloat(w), height: CGFloat(h), length: CGFloat(w * 0.85), chamferRadius: 0.1)
                      let mat = SCNMaterial()
                      mat.diffuse.contents = UIColor(red: 0.15, green: 0.14, blue: 0.18, alpha: 1)
                      geo.materials = [mat]
                      let node = SCNNode(geometry: geo)
                      node.position = SCNVector3(x, h/2, z)
                      node.physicsBody = SCNPhysicsBody(type: .static, shape: nil)
                      node.physicsBody?.categoryBitMask  = PhysicsMask.wall
                      node.physicsBody?.collisionBitMask = PhysicsMask.player | PhysicsMask.enemy | PhysicsMask.bullet
                      scene.rootNode.addChildNode(node)
                  }
              }

              private func spawnPlayer() {
                  playerNode = SCNNode()
                  playerNode.position = SCNVector3(0, 0, 10)

                  let bodyGeo = SCNCapsule(capRadius: 0.4, height: 1.6)
                  let bodyMat = SCNMaterial()
                  bodyMat.diffuse.contents = UIColor.cyan
                  bodyGeo.materials = [bodyMat]
                  playerBody = SCNNode(geometry: bodyGeo)
                  playerBody.position = SCNVector3(0, 0.8, 0)
                  playerNode.addChildNode(playerBody)

                  let pointerGeo = SCNBox(width: 0.15, height: 0.15, length: 0.5, chamferRadius: 0)
                  let pointerMat = SCNMaterial()
                  pointerMat.diffuse.contents = UIColor.white
                  pointerGeo.materials = [pointerMat]
                  let pointer = SCNNode(geometry: pointerGeo)
                  pointer.position = SCNVector3(0, 0.4, -0.4)
                  playerBody.addChildNode(pointer)

                  let shape = SCNPhysicsShape(geometry: bodyGeo, options: nil)
                  let pBody = SCNPhysicsBody(type: .dynamic, shape: shape)
                  pBody.allowsResting = false
                  pBody.friction = 0
                  pBody.rollingFriction = 0
                  pBody.categoryBitMask = PhysicsMask.player
                  pBody.contactTestBitMask = PhysicsMask.enemy | PhysicsMask.item
                  pBody.collisionBitMask = PhysicsMask.wall | PhysicsMask.ground
                  playerNode.physicsBody = pBody

                  scene.rootNode.addChildNode(playerNode)
              }

              private func setupCamera() {
                  cameraArm = SCNNode()
                  cameraArm.position = SCNVector3(0, 1.2, 0)
                  playerNode.addChildNode(cameraArm)

                  cameraNode = SCNNode()
                  cameraNode.camera = SCNCamera()
                  cameraNode.camera?.zNear = 0.1
                  cameraNode.camera?.zFar = 120
                  cameraNode.position = SCNVector3(0, 3.8, 7.5)
                  cameraNode.eulerAngles.x = cameraPitch
                  cameraArm.addChildNode(cameraNode)
              }

              private func setupLighting() {
                  let ambient = SCNNode()
                  ambient.light = SCNLight()
                  ambient.light?.type = .ambient
                  ambient.light?.intensity = 180
                  ambient.light?.color = UIColor(red: 0.6, green: 0.5, blue: 0.7, alpha: 1)
                  scene.rootNode.addChildNode(ambient)

                  let sun = SCNNode()
                  sun.light = SCNLight()
                  sun.light?.type = .directional
                  sun.light?.intensity = 400
                  sun.light?.color = UIColor(red: 0.8, green: 0.8, blue: 1.0, alpha: 1)
                  sun.position = SCNVector3(10, 30, 10)
                  sun.eulerAngles = SCNVector3(-Float.pi/3, Float.pi/4, 0)
                  scene.rootNode.addChildNode(sun)
              }

              private func setupHUD() {
                  hudView = HUDOverlay(frame: view.bounds)
                  hudView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(hudView)
                  hudView.update(health: health, maxHealth: maxHealth, ammo: ammo, totalAmmo: totalAmmo, score: score, wave: wave, isReloading: isReloading)
              }

              private func setupJoysticks() {
                  let pad: CGFloat = 30
                  let rad: CGFloat = 70
                  let h = view.bounds.height
                  let w = view.bounds.width

                  moveJoystick = JoystickView(radius: rad, accentColor: .cyan)
                  moveJoystick.frame.origin = CGPoint(x: pad + 15, y: h - (rad * 2) - pad - 15)
                  view.addSubview(moveJoystick)

                  aimJoystick = JoystickView(radius: rad, accentColor: UIColor(red: 1.0, green: 0.0, blue: 0.4, alpha: 1))
                  aimJoystick.frame.origin = CGPoint(x: w - (rad * 2) - pad - 15, y: h - (rad * 2) - pad - 15)
                  view.addSubview(aimJoystick)
              }

              // MARK: - Core Multi-Touch Handle
              override func touchesBegan(_ touches: Set<UITouch>, with event: UIEvent?) {
                  for touch in touches {
                      let pt = touch.location(in: view)
                      if pt.x < view.bounds.width / 2 {
                          if moveJoystick.trackingTouch == nil {
                              moveJoystick.trackingTouch = touch
                              moveJoystick.moveTouch(touch, in: view)
                          }
                      } else {
                          if aimJoystick.trackingTouch == nil {
                              aimJoystick.trackingTouch = touch
                              aimJoystick.moveTouch(touch, in: view)
                          }
                      }
                  }
              }

              override func touchesMoved(_ touches: Set<UITouch>, with event: UIEvent?) {
                  for touch in touches {
                      if touch == moveJoystick.trackingTouch {
                          moveJoystick.moveTouch(touch, in: view)
                      } else if touch == aimJoystick.trackingTouch {
                          aimJoystick.moveTouch(touch, in: view)
                      }
                  }
              }

              override func touchesEnded(_ touches: Set<UITouch>, with event: UIEvent?) {
                  for touch in touches {
                      if touch == moveJoystick.trackingTouch { moveJoystick.reset() }
                      if touch == aimJoystick.trackingTouch { aimJoystick.reset() }
                  }
              }

              override func touchesCancelled(_ touches: Set<UITouch>, with event: UIEvent?) {
                  for touch in touches {
                      if touch == moveJoystick.trackingTouch { moveJoystick.reset() }
                      if touch == aimJoystick.trackingTouch { aimJoystick.reset() }
                  }
              }

              // MARK: - Game Loop
              func renderer(_ renderer: SCNSceneRenderer, updateAtTime time: TimeInterval) {
                  if lastTime == 0 { lastTime = time }
                  let dt = Float(min(time - lastTime, 1.0 / 30.0))
                  lastTime = time

                  guard !isGameOver else { return }

                  handleMovement(dt: dt)
                  handleAimAndFiring(time: time)
                  updateEnemies(dt: dt, time: time)
                  manageDirectorSpawns(dt: dt, time: time)
              }

              private func handleMovement(dt: Float) {
                  guard let pBody = playerNode.physicsBody else { return }
                  
                  if moveJoystick.isActive {
                      let vel = moveJoystick.velocity
                      let speedMultiplier: Float = 5.5
                      
                      let forwardX = Float(sin(cameraYaw))
                      let forwardZ = Float(cos(cameraYaw))
                      let rightX = Float(sin(cameraYaw + .pi/2))
                      let rightZ = Float(cos(cameraYaw + .pi/2))
                      
                      let moveX = (rightX * Float(vel.x)) + (forwardX * Float(vel.y))
                      let moveZ = (rightZ * Float(vel.x)) + (forwardZ * Float(vel.y))
                      
                      pBody.velocity = SCNVector3(moveX * speedMultiplier, pBody.velocity.y, moveZ * speedMultiplier)
                      
                      if !aimJoystick.isActive {
                          playerBody.eulerAngles.y = atan2(moveX, moveZ)
                      }
                  } else {
                      pBody.velocity = SCNVector3(0, pBody.velocity.y, 0)
                  }
              }

              private func handleAimAndFiring(time: TimeInterval) {
                  if aimJoystick.isActive {
                      let av = aimJoystick.velocity
                      
                      let forwardX = Float(sin(cameraYaw))
                      let forwardZ = Float(cos(cameraYaw))
                      let rightX = Float(sin(cameraYaw + .pi/2))
                      let rightZ = Float(cos(cameraYaw + .pi/2))
                      
                      let worldAimX = (rightX * Float(av.x)) + (forwardX * Float(av.y))
                      let worldAimZ = (rightZ * Float(av.x)) + (forwardZ * Float(av.y))
                      
                      playerBody.eulerAngles.y = atan2(worldAimX, worldAimZ)
                      
                      if time - lastShotTime >= 0.15 {
                          fireBullet(direction: SCNVector3(worldAimX, 0, worldAimZ))
                          lastShotTime = time
                      }
                  }
              }

              private func fireBullet(direction: SCNVector3) {
                  guard ammo > 0, !isReloading else {
                      if ammo == 0 && !isReloading { performWeaponReload() }
                      return
                  }

                  ammo -= 1
                  DispatchQueue.main.async {
                      self.hudView.update(health: self.health, maxHealth: self.maxHealth, ammo: self.ammo, totalAmmo: self.totalAmmo, score: self.score, wave: self.wave, isReloading: self.isReloading)
                  }

                  let bulletGeo = SCNSphere(radius: 0.15)
                  bulletGeo.firstMaterial?.diffuse.contents = UIColor.magenta
                  bulletGeo.firstMaterial?.emission.contents = UIColor.magenta
                  
                  let bulletNode = SCNNode(geometry: bulletGeo)
                  bulletNode.position = SCNVector3(playerNode.position.x, playerNode.position.y + 1.2, playerNode.position.z)
                  
                  let pBody = SCNPhysicsBody(type: .dynamic, shape: nil)
                  pBody.isAffectedByGravity = false
                  pBody.categoryBitMask = PhysicsMask.bullet
                  pBody.contactTestBitMask = PhysicsMask.enemy | PhysicsMask.wall
                  pBody.collisionBitMask = PhysicsMask.none
                  
                  let normalizedDir = normalize(direction)
                  let bSpeed: Float = 24.0
                  pBody.velocity = SCNVector3(normalizedDir.x * bSpeed, 0, normalizedDir.z * bSpeed)
                  bulletNode.physicsBody = pBody
                  
                  scene.rootNode.addChildNode(bulletNode)
                  
                  bulletNode.runAction(.sequence([
                      .wait(duration: 1.8),
                      .removeFromParentNode()
                  ]))
              }

              private func performWeaponReload() {
                  guard totalAmmo > 0 else { return }
                  isReloading = true
                  hudView.update(health: health, maxHealth: maxHealth, ammo: ammo, totalAmmo: totalAmmo, score: score, wave: wave, isReloading: isReloading)
                  
                  DispatchQueue.main.asyncAfter(deadline: .now() + 1.2) { [weak self] in
                      guard let self = self else { return }
                      let needed = 30 - self.ammo
                      let transfer = min(needed, self.totalAmmo)
                      self.ammo += transfer
                      self.totalAmmo -= transfer
                      self.isReloading = false
                      self.hudView.update(health: self.health, maxHealth: self.maxHealth, ammo: self.ammo, totalAmmo: self.totalAmmo, score: self.score, wave: self.wave, isReloading: self.isReloading)
                  }
              }

              private func updateEnemies(dt: Float, time: TimeInterval) {
                  enemies = enemies.filter { $0.parent != nil }
                  for enemy in enemies where enemy.isAlive {
                      enemy.moveToward(target: playerNode.position, dt: dt)
                      
                      if enemy.distanceTo(playerNode.position) <= enemy.kind.attackRange {
                          if enemy.canAttack(at: time) {
                              enemy.lastAttackTime = time
                              playerTakeDamage(enemy.kind.damage)
                          }
                      }
                  }
              }

              private func playerTakeDamage(_ amount: Float) {
                  guard !isGameOver else { return }
                  health -= amount
                  hudView.update(health: health, maxHealth: maxHealth, ammo: ammo, totalAmmo: totalAmmo, score: score, wave: wave, isReloading: isReloading)
                  
                  if health <= 0 {
                      isGameOver = true
                      hudView.showMessage("SYSTEM COLLAPSE: REBOOT REQUIRED", color: .red, duration: 6.0)
                  }
              }

              private func manageDirectorSpawns(dt: Float, time: TimeInterval) {
                  if !waveActive && enemies.isEmpty {
                      waveActive = true
                      waveTimer = 4.0
                  }
                  
                  if waveActive {
                      waveTimer -= Double(dt)
                      if waveTimer <= 0 {
                          waveActive = false
                          wave += 1
                          triggerNextWaveSpawns()
                      }
                  }
              }

              private func triggerNextWaveSpawns() {
                  hudView.showMessage("PHASE \(wave) INTERFACE COMMENCING", color: .cyan, duration: 2.0)
                  let baseCount = wave * 3 + 2
                  
                  for i in 0..<baseCount {
                      let delay = Double(i) * 0.4
                      DispatchQueue.main.asyncAfter(deadline: .now() + delay) { [weak self] in
                          guard let self = self, !self.isGameOver else { return }
                          let kind: EnemyKind = (self.wave % 3 == 0 && i == 0) ? .brute : .walker
                          self.spawnEnemy(kind: kind)
                      }
                  }
              }

              private func spawnEnemy(kind: EnemyKind) {
                  let enemy = EnemyNode(kind: kind)
                  let angle = Float.random(in: 0...(Float.pi * 2))
                  let radius = Float.random(in: 18...26)
                  
                  enemy.position = SCNVector3(
                      playerNode.position.x + sin(angle) * radius,
                      0,
                      playerNode.position.z + cos(angle) * radius
                  )
                  
                  scene.rootNode.addChildNode(enemy)
                  enemies.append(enemy)
              }

              func physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact) {
                  let maskA = contact.nodeA.physicsBody?.categoryBitMask ?? 0
                  let maskB = contact.nodeB.physicsBody?.categoryBitMask ?? 0
                  
                  if (maskA == PhysicsMask.bullet && maskB == PhysicsMask.enemy) {
                      handleBulletCollision(bullet: contact.nodeA, enemy: contact.nodeB as? EnemyNode)
                  } else if (maskA == PhysicsMask.enemy && maskB == PhysicsMask.bullet) {
                      handleBulletCollision(bullet: contact.nodeB, enemy: contact.nodeA as? EnemyNode)
                  }
              }

              private func handleBulletCollision(bullet: SCNNode, enemy: EnemyNode?) {
                  bullet.removeFromParentNode()
                  guard let enemy = enemy else { return }
                  enemy.takeDamage(15)
                  
                  if !enemy.isAlive {
                      score += enemy.kind.scoreValue
                      DispatchQueue.main.async {
                          self.hudView.update(health: self.health, maxHealth: self.maxHealth, ammo: self.ammo, totalAmmo: self.totalAmmo, score: self.score, wave: self.wave, isReloading: self.isReloading)
                      }
                  }
              }

              private func normalize(_ v: SCNVector3) -> SCNVector3 {
                  let len = sqrt(v.x * v.x + v.y * v.y + v.z * v.z)
                  return len == 0 ? v : SCNVector3(v.x / len, v.y / len, v.z / len)
              }
          }
          SWIFT_EOF

      # ── 3. GENERATE PROJECT CONFIG & ARCHIVE ────────────────────────────────
      - name: Generate Project Configuration
        run: |
          cat > project.yml << 'EOF'
          name: SV3D
          options:
            bundleIdPrefix: com.engine.studio
          targets:
            SV3D:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources: [SV3D]
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.engine.studio.SV3D
                DEVELOPMENT_TEAM: ""
                CODE_SIGNING_REQUIRED: "NO"
                CODE_SIGN_IDENTITY: ""
                CODE_SIGNING_ALLOWED: "NO"
          EOF
          xcodegen generate

      - name: Build Application Architecture
        run: |
          xcodebuild clean build \
            -project SV3D.xcodeproj \
            -scheme SV3D \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            CODE_SIGNING_ALLOWED=NO | xcpretty
