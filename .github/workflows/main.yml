name: 🎮 Shadow Village 3D – Twin Stick iOS Game

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Export IPA
    runs-on: macos-14
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Install Build Tools
        run: |
          brew install xcodegen
          gem install xcpretty --no-document 2>/dev/null || true

      - name: Create Project Directories
        run: |
          mkdir -p SV3D/Sources

      # ── AppDelegate ──────────────────────────────────────────────────────────
      - name: Create AppDelegate.swift
        run: |
          cat > SV3D/Sources/AppDelegate.swift << 'SWIFT_EOF'
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(
                  _ application: UIApplication,
                  didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
              ) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = GameViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          SWIFT_EOF

      # ── Types ────────────────────────────────────────────────────────────────
      - name: Create Types.swift
        run: |
          cat > SV3D/Sources/Types.swift << 'SWIFT_EOF'
          import UIKit

          struct PhysicsMask {
              static let none:   Int = 0
              static let player: Int = 1 << 0
              static let enemy:  Int = 1 << 1
              static let bullet: Int = 1 << 2
              static let wall:   Int = 1 << 3
              static let ground: Int = 1 << 4
              static let item:   Int = 1 << 5
          }

          enum EnemyKind {
              case walker, brute, runner, cultist, boss

              var health: Float {
                  switch self {
                  case .walker:  return 100
                  case .brute:   return 350
                  case .runner:  return 60
                  case .cultist: return 90
                  case .boss:    return 1500
                  }
              }
              var speed: Float {
                  switch self {
                  case .walker:  return 2.2
                  case .brute:   return 1.1
                  case .runner:  return 4.5
                  case .cultist: return 1.8
                  case .boss:    return 1.6
                  }
              }
              var damage: Float {
                  switch self {
                  case .walker:  return 12
                  case .brute:   return 35
                  case .runner:  return 8
                  case .cultist: return 20
                  case .boss:    return 50
                  }
              }
              var attackRange: Float {
                  switch self {
                  case .walker:  return 1.0
                  case .brute:   return 1.4
                  case .runner:  return 0.9
                  case .cultist: return 1.0
                  case .boss:    return 2.0
                  }
              }
              var scoreValue: Int {
                  switch self {
                  case .walker:  return 100
                  case .brute:   return 300
                  case .runner:  return 150
                  case .cultist: return 200
                  case .boss:    return 3000
                  }
              }
              var attackInterval: TimeInterval { return self == .boss ? 0.8 : 1.4 }
              var radius: Float {
                  switch self {
                  case .walker:  return 0.35
                  case .brute:   return 0.60
                  case .runner:  return 0.28
                  case .cultist: return 0.33
                  case .boss:    return 1.10
                  }
              }
              var height: Float { return radius * 4.0 }
              var bodyColor: UIColor {
                  switch self {
                  case .walker:  return UIColor(red: 0.50, green: 0.28, blue: 0.18, alpha: 1)
                  case .brute:   return UIColor(red: 0.40, green: 0.10, blue: 0.08, alpha: 1)
                  case .runner:  return UIColor(red: 0.55, green: 0.12, blue: 0.50, alpha: 1)
                  case .cultist: return UIColor(red: 0.22, green: 0.00, blue: 0.28, alpha: 1)
                  case .boss:    return UIColor(red: 0.70, green: 0.00, blue: 0.00, alpha: 1)
                  }
              }
          }
          SWIFT_EOF

      # ── Native Controller Input System (iOS 15+) ─────────────────────────────
      - name: Create ControllerInput.swift
        run: |
          cat > SV3D/Sources/ControllerInput.swift << 'SWIFT_EOF'
          import GameController
          import CoreHaptics
          import UIKit

          class ControllerInput: ObservableObject {
              static let shared = ControllerInput()
              
              private var hapticEngine: CHHapticEngine?
              private var gcController: GCVirtualController?
              
              private init() {
                  setupHaptics()
                  setupVirtualController()
              }
              
              private func setupVirtualController() {
                  let config = GCVirtualController.Configuration()
                  config.elements = [
                      GCInputLeftThumbstick,
                      GCInputRightThumbstick,
                      GCInputButtonA,    // Fire/Action
                      GCInputButtonX     // Reload
                  ]
                  gcController = GCVirtualController(configuration: config)
              }
              
              func connect() {
                  gcController?.connect()
              }
              
              func disconnect() {
                  gcController?.disconnect()
              }
              
              func triggerButtonHaptic(intensity: Float = 0.7) {
                  guard let engine = hapticEngine else { return }
                  let event = CHHapticEvent(
                      eventType: .hapticTransient,
                      parameters: [
                          CHHapticEventParameter(parameterID: .hapticIntensity, value: intensity),
                          CHHapticEventParameter(parameterID: .hapticSharpness, value: 0.5)
                      ],
                      relativeTime: 0
                  )
                  if let pattern = try? CHHapticPattern(events: [event], parameters: []) {
                      let player = try? engine.makePlayer(with: pattern)
                      try? player?.start(atTime: CHHapticTimeImmediate)
                  }
              }
              
              private func setupHaptics() {
                  guard CHHapticEngine.capabilitiesForHardware().supportsHaptics else { return }
                  hapticEngine = try? CHHapticEngine()
                  try? hapticEngine?.start()
              }
          }
          SWIFT_EOF

      # ── HUDOverlay ───────────────────────────────────────────────────────────
      - name: Create HUDOverlay.swift
        run: |
          cat > SV3D/Sources/HUDOverlay.swift << 'SWIFT_EOF'
          import UIKit

          class HUDOverlay: UIView {
              private let hpBg      = UIView()
              private let hpBar     = UIView()
              private let ammoLbl   = UILabel()
              private let scoreLbl  = UILabel()
              private let waveLbl   = UILabel()
              private let msgLbl    = UILabel()
              private let reloadLbl = UILabel()
              let barW: CGFloat = 220

              override init(frame: CGRect) {
                  super.init(frame: frame)
                  isUserInteractionEnabled = false
                  buildUI()
              }
              required init?(coder: NSCoder) { fatalError() }

              private func customFont(_ size: CGFloat, bold: Bool = false) -> UIFont {
                  return bold ? UIFont.systemFont(ofSize: size, weight: .bold) : UIFont.systemFont(ofSize: size, weight: .regular)
              }

              private func buildUI() {
                  hpBg.frame            = CGRect(x: 20, y: 20, width: barW + 4, height: 14)
                  hpBg.backgroundColor  = UIColor(white: 0.05, alpha: 0.6)
                  hpBg.layer.cornerRadius = 7
                  hpBg.layer.borderColor = UIColor(white: 1.0, alpha: 0.15).cgColor
                  hpBg.layer.borderWidth = 1
                  addSubview(hpBg)

                  hpBar.frame             = CGRect(x: 22, y: 22, width: barW, height: 10)
                  hpBar.backgroundColor   = UIColor(red: 0.00, green: 0.90, blue: 0.45, alpha: 1.0)
                  hpBar.layer.cornerRadius = 5
                  addSubview(hpBar)

                  scoreLbl.frame            = CGRect(x: bounds.width - 240, y: 20, width: 220, height: 26)
                  scoreLbl.autoresizingMask = [.flexibleLeftMargin]
                  scoreLbl.text             = "SCORE // 000000"
                  scoreLbl.textColor        = UIColor(white: 0.95, alpha: 1.0)
                  scoreLbl.font             = customFont(16, bold: true)
                  scoreLbl.textAlignment    = .right
                  addSubview(scoreLbl)

                  waveLbl.frame            = CGRect(x: 0, y: 20, width: bounds.width, height: 26)
                  waveLbl.autoresizingMask = [.flexibleWidth]
                  waveLbl.text             = "PHASE 00"
                  waveLbl.textColor        = UIColor(red: 1.0, green: 0.25, blue: 0.25, alpha: 1.0)
                  waveLbl.font             = customFont(15, bold: true)
                  waveLbl.textAlignment    = .center
                  addSubview(waveLbl)

                  ammoLbl.frame            = CGRect(x: bounds.width - 200, y: bounds.height - 65, width: 180, height: 45)
                  ammoLbl.autoresizingMask = [.flexibleLeftMargin, .flexibleTopMargin]
                  ammoLbl.text             = "30 / 90"
                  ammoLbl.textColor        = .white
                  ammoLbl.font             = customFont(32, bold: true)
                  ammoLbl.textAlignment    = .right
                  addSubview(ammoLbl)

                  reloadLbl.frame            = CGRect(x: bounds.width - 200, y: bounds.height - 95, width: 180, height: 26)
                  reloadLbl.autoresizingMask = [.flexibleLeftMargin, .flexibleTopMargin]
                  reloadLbl.text             = "RECHARGING WEAPON"
                  reloadLbl.textColor        = UIColor(red: 1.0, green: 0.60, blue: 0.00, alpha: 1)
                  reloadLbl.font             = customFont(12, bold: true)
                  reloadLbl.textAlignment    = .right
                  reloadLbl.isHidden         = true
                  addSubview(reloadLbl)

                  msgLbl.frame            = CGRect(x: 0, y: bounds.height * 0.35, width: bounds.width, height: 50)
                  msgLbl.autoresizingMask = [.flexibleWidth, .flexibleTopMargin, .flexibleBottomMargin]
                  msgLbl.textColor        = .white
                  msgLbl.font             = customFont(26, bold: true)
                  msgLbl.textAlignment    = .center
                  msgLbl.alpha            = 0
                  addSubview(msgLbl)

                  addSubview(makeCrosshair())
              }

              private func makeCrosshair() -> UIView {
                  let s: CGFloat = 16, g: CGFloat = 4, t: CGFloat = 1.5
                  let w = bounds.width / 2, h = bounds.height / 2
                  let col = UIColor(red: 0.0, green: 1.0, blue: 1.0, alpha: 0.9)
                  let container = UIView(frame: bounds)
                  container.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  container.isUserInteractionEnabled = false

                  func bar(_ f: CGRect) -> UIView {
                      let b = UIView(frame: f)
                      b.backgroundColor = col
                      return b
                  }
                  container.addSubview(bar(CGRect(x: w - s - g / 2, y: h - t / 2, width: s, height: t)))
                  container.addSubview(bar(CGRect(x: w + g / 2,     y: h - t / 2, width: s, height: t)))
                  container.addSubview(bar(CGRect(x: w - t / 2,     y: h - s - g / 2, width: t, height: s)))
                  container.addSubview(bar(CGRect(x: w - t / 2,     y: h + g / 2, width: t, height: s)))
                  return container
              }

              func update(health: Float, maxHealth: Float, ammo: Int,
                          totalAmmo: Int, score: Int, wave: Int, isReloading: Bool) {
                  let ratio = CGFloat(max(0, health / maxHealth))
                  UIView.animate(withDuration: 0.15) { self.hpBar.frame.size.width = self.barW * ratio }
                  hpBar.backgroundColor = ratio > 0.5 
                      ? UIColor(red: 0.00, green: 0.90, blue: 0.45, alpha: 1.0)
                      : ratio > 0.25 
                      ? UIColor(red: 1.00, green: 0.65, blue: 0.00, alpha: 1.0)
                      : UIColor(red: 1.00, green: 0.15, blue: 0.15, alpha: 1.0)
                  
                  ammoLbl.text      = "\(ammo) / \(totalAmmo)"
                  ammoLbl.textColor = ammo == 0 ? .red : ammo <= 5 ? .orange : .white
                  scoreLbl.text     = String(format: "SCORE // %06d", score)
                  waveLbl.text      = String(format: "PHASE %02d", wave)
                  reloadLbl.isHidden = !isReloading
              }

              func showMessage(_ text: String, color: UIColor = .white, duration: TimeInterval = 2.0) {
                  msgLbl.text      = text.uppercased()
                  msgLbl.textColor = color
                  msgLbl.alpha     = 0
                  msgLbl.transform = CGAffineTransform(scaleX: 0.85, y: 0.85)
                  UIView.animate(withDuration: 0.2) {
                      self.msgLbl.alpha     = 1
                      self.msgLbl.transform = .identity
                  } completion: { _ in
                      UIView.animate(withDuration: 0.3, delay: duration - 0.3) {
                          self.msgLbl.alpha = 0
                      }
                  }
              }
          }
          SWIFT_EOF

      # ── EnemyNode ────────────────────────────────────────────────────────────
      - name: Create EnemyNode.swift
        run: |
          cat > SV3D/Sources/EnemyNode.swift << 'SWIFT_EOF'
          import SceneKit
          import UIKit

          class EnemyNode: SCNNode {
              let kind:    EnemyKind
              var hp:      Float
              var isAlive: Bool = true
              var lastAttackTime: TimeInterval = 0
              private var bodyMeshNode: SCNNode!

              init(kind: EnemyKind) {
                  self.kind = kind
                  self.hp   = kind.health
                  super.init()
                  buildMesh()
                  buildPhysics()
              }
              required init?(coder: NSCoder) { fatalError() }

              private func buildMesh() {
                  let capsule = SCNCapsule(capRadius: CGFloat(kind.radius), height: CGFloat(kind.height))
                  let mat = SCNMaterial()
                  mat.diffuse.contents = kind.bodyColor
                  mat.lightingModel    = .lambert
                  capsule.materials    = [mat]
                  bodyMeshNode          = SCNNode(geometry: capsule)
                  bodyMeshNode.position = SCNVector3(0, CGFloat(kind.height * 0.5), 0)
                  addChildNode(bodyMeshNode)

                  for side: Float in [-1, 1] {
                      let eyeGeo = SCNSphere(radius: CGFloat(kind.radius * 0.2))
                      let eyeMat = SCNMaterial()
                      eyeMat.diffuse.contents  = UIColor(red: 0.95, green: 0.05, blue: 0.05, alpha: 1)
                      eyeMat.emission.contents = UIColor(red: 0.6, green: 0, blue: 0, alpha: 1)
                      eyeMat.lightingModel     = .constant
                      eyeGeo.materials = [eyeMat]
                      let eye = SCNNode(geometry: eyeGeo)
                      eye.position = SCNVector3(side * kind.radius * 0.4, kind.height * 0.82, -(kind.radius * 0.75))
                      addChildNode(eye)
                  }

                  if kind == .boss {
                      let crown = SCNTorus(ringRadius: CGFloat(kind.radius * 0.85), pipeRadius: 0.10)
                      let crownMat = SCNMaterial()
                      crownMat.diffuse.contents  = UIColor(red: 1, green: 0.8, blue: 0, alpha: 1)
                      crownMat.emission.contents = UIColor(red: 0.6, green: 0.4, blue: 0, alpha: 1)
                      crownMat.lightingModel     = .constant
                      crown.materials = [crownMat]
                      let crownNode = SCNNode(geometry: crown)
                      crownNode.position = SCNVector3(0, CGFloat(kind.height + 0.3), 0)
                      crownNode.runAction(SCNAction.repeatForever(
                          SCNAction.rotateBy(x: 0, y: .pi * 2, z: 0, duration: 2.5)
                      ))
                      addChildNode(crownNode)
                      bodyMeshNode.runAction(SCNAction.repeatForever(SCNAction.sequence([
                          SCNAction.scale(to: 1.06, duration: 0.5),
                          SCNAction.scale(to: 0.94, duration: 0.5)
                      ])))
                  }
              }

              private func buildPhysics() {
                  let geo   = SCNCapsule(capRadius: CGFloat(kind.radius), height: CGFloat(kind.height))
                  let shape = SCNPhysicsShape(geometry: geo, options: nil)
                  let body  = SCNPhysicsBody(type: .kinematic, shape: shape)
                  body.categoryBitMask    = PhysicsMask.enemy
                  body.contactTestBitMask = PhysicsMask.bullet | PhysicsMask.player
                  body.collisionBitMask   = PhysicsMask.wall | PhysicsMask.ground
                  physicsBody = body
              }

              func takeDamage(_ amount: Float) {
                  guard isAlive else { return }
                  hp -= amount
                  flashWhite()
                  if hp <= 0 { isAlive = false; die() }
              }

              private func flashWhite() {
                  let whiteMat = SCNMaterial()
                  whiteMat.diffuse.contents = UIColor.white
                  whiteMat.lightingModel    = .constant
                  let origMat = SCNMaterial()
                  origMat.diffuse.contents  = kind.bodyColor
                  origMat.lightingModel     = .lambert
                  bodyMeshNode.geometry?.materials = [whiteMat]
                  DispatchQueue.main.asyncAfter(deadline: .now() + 0.07) { [weak self] in
                      self?.bodyMeshNode.geometry?.materials = [origMat]
                  }
              }

              private func die() {
                  physicsBody = nil
                  runAction(SCNAction.sequence([
                      SCNAction.group([
                          SCNAction.rotateBy(x: 0, y: 0, z: .pi * 1.5, duration: 0.45),
                          SCNAction.scale(to: 0.02, duration: 0.45),
                          SCNAction.fadeOut(duration: 0.45)
                      ]),
                      SCNAction.removeFromParentNode()
                  ]))
              }

              func moveToward(target: SCNVector3, dt: Float) {
                  guard isAlive else { return }
                  let dx   = target.x - position.x
                  let dz   = target.z - position.z
                  let dist = sqrt(dx * dx + dz * dz)
                  guard dist > kind.attackRange * 0.8 else { return }
                  let spd = kind.speed * dt
                  position.x += dx / dist * spd
                  position.z += dz / dist * spd
                  eulerAngles.y = atan2(dx, dz)
              }

              func distanceTo(_ p: SCNVector3) -> Float {
                  let dx = position.x - p.x
                  let dz = position.z - p.z
                  return sqrt(dx * dx + dz * dz)
              }

              func canAttack(at t: TimeInterval) -> Bool {
                  return t - lastAttackTime >= kind.attackInterval
              }
          }
          SWIFT_EOF

      # ── GameViewController ───────────────────────────────────────────────────
      - name: Create GameViewController.swift
        run: |
          cat > SV3D/Sources/GameViewController.swift << 'SWIFT_EOF'
          import UIKit
          import SceneKit
          import GameController

          class GameViewController: UIViewController, SCNSceneRendererDelegate, SCNPhysicsContactDelegate {

              private var scnView: SCNView!
              private var scene:   SCNScene!

              private var playerNode: SCNNode!
              private var playerBody: SCNNode!
              private var cameraArm:  SCNNode!
              private var cameraNode: SCNNode!

              private var isGameStarted: Bool         = false
              private var health       : Float        = 100
              private var maxHealth    : Float        = 100
              private var ammo         : Int          = 30
              private var totalAmmo    : Int          = 90
              private var score        : Int          = 0
              private var wave         : Int          = 0
              private var isReloading  : Bool         = false
              private var canShoot     : Bool         = true
              private var isGameOver   : Bool         = false
              private var waveActive   : Bool         = false
              private var bossSpawned  : Bool         = false
              private var waveTimer    : TimeInterval = 3.0
              private var lastTime     : TimeInterval = 0
              private var enemies      : [EnemyNode]  = []
              private var bullets      : [SCNNode]    = []
              private var lastShotTime : TimeInterval = 0

              private var startOverlay : UIView!
              private var hudView      : HUDOverlay!
              
              private var cameraYaw    : Float   = 0
              private let cameraPitch  : Float   = -0.22

              private var hardwareMoveVector: SIMD2<Float> = .zero
              private var hardwareAimVector : SIMD2<Float> = .zero
              private var isGamepadConnected: Bool = false

              private let mapHalf: Float = 30.0

              override func viewDidLoad() {
                  super.viewDidLoad()
                  setupScene()
                  buildWorld()
                  spawnPlayer()
                  setupCamera()
                  setupLighting()
                  setupHUD()
                  setupStartScreen()
                  setupGamepadObservers()
              }

              override var prefersStatusBarHidden: Bool { return true }
              override var shouldAutorotate: Bool { return true }
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { return .landscape }
              override var prefersHomeIndicatorAutoHidden: Bool { return true }

              private func setupStartScreen() {
                  startOverlay = UIView(frame: view.bounds)
                  startOverlay.backgroundColor = UIColor(red: 0.04, green: 0.03, blue: 0.08, alpha: 0.95)
                  startOverlay.autoresizingMask = [.flexibleWidth, .flexibleHeight]

                  let titleLabel = UILabel()
                  titleLabel.text = "SHADOW VILLAGE 3D"
                  titleLabel.textColor = UIColor(red: 1.0, green: 0.0, blue: 0.4, alpha: 1.0)
                  titleLabel.font = UIFont.systemFont(ofSize: 42, weight: .bold)
                  titleLabel.textAlignment = .center
                  titleLabel.frame = CGRect(x: 0, y: view.bounds.height * 0.25, width: view.bounds.width, height: 60)
                  titleLabel.autoresizingMask = [.flexibleWidth, .flexibleBottomMargin]
                  startOverlay.addSubview(titleLabel)

                  let startButton = UIButton(type: .custom)
                  startButton.setTitle("INITIALIZE SYSTEM", for: .normal)
                  startButton.setTitleColor(.white, for: .normal)
                  startButton.titleLabel?.font = UIFont.systemFont(ofSize: 20, weight: .bold)
                  startButton.backgroundColor = UIColor.cyan.withAlphaComponent(0.2)
                  startButton.layer.borderColor = UIColor.cyan.cgColor
                  startButton.layer.borderWidth = 2
                  startButton.layer.cornerRadius = 8
                  startButton.frame = CGRect(x: (view.bounds.width - 240)/2, y: view.bounds.height * 0.55, width: 240, height: 55)
                  startButton.autoresizingMask = [.flexibleLeftMargin, .flexibleRightMargin, .flexibleTopMargin, .flexibleBottomMargin]
                  startButton.addTarget(self, action: #selector(startGameButtonPressed), for: .touchUpInside)
                  startOverlay.addSubview(startButton)

                  view.addSubview(startOverlay)
                  hudView.isHidden = true
              }

              @objc private func startGameButtonPressed() {
                  guard !isGameStarted else { return }
                  isGameStarted = true
                  
                  UIView.animate(withDuration: 0.4, animations: {
                      self.startOverlay.alpha = 0
                  }) { _ in
                      self.startOverlay.removeFromSuperview()
                      self.hudView.isHidden = false
                      
                      // native Virtual Controller কানেক্ট করা হলো
                      ControllerInput.shared.connect()
                      
                      self.waveTimer = 3.0
                      self.hudView.showMessage("INCOMING ANOMALY DETECTED", color: .red, duration: 2.5)
                  }
              }

              private func setupGamepadObservers() {
                  NotificationCenter.default.addObserver(self, selector: #selector(gamepadDidConnect(_:)), name: .GCControllerDidConnect, object: nil)
                  NotificationCenter.default.addObserver(self, selector: #selector(gamepadDidDisconnect(_:)), name: .GCControllerDidDisconnect, object: nil)
                  
                  if let controller = GCController.controllers().first {
                      configureGamepadInput(controller)
                  }
              }

              @objc private func gamepadDidConnect(_ notification: Notification) {
                  if let controller = notification.object as? GCController {
                      configureGamepadInput(controller)
                  }
              }

              @objc private func gamepadDidDisconnect(_ notification: Notification) {
                  isGamepadConnected = false
              }

              private func configureGamepadInput(_ controller: GCController) {
                  isGamepadConnected = true

                  if let gamepad = controller.extendedGamepad {
                      // Left Stick -> মুভমেন্ট ভেক্টর ম্যাপ
                      gamepad.leftThumbstick.valueChangedHandler = { [weak self] (_, x, y) in
                          self?.hardwareMoveVector = SIMD2<Float>(x, -y)
                      }
                      // Right Stick -> এইমিং ভেক্টর ম্যাপ
                      gamepad.rightThumbstick.valueChangedHandler = { [weak self] (_, x, y) in
                          self?.hardwareAimVector = SIMD2<Float>(x, -y)
                      }
                      // Square Button / Button X -> রিলোড সিস্টেম ম্যাপ
                      gamepad.buttonX.pressedChangedHandler = { [weak self] (_, _, isPressed) in
                          if isPressed { 
                              self?.performWeaponReload() 
                              ControllerInput.shared.triggerButtonHaptic(intensity: 0.5)
                          }
                      }
                      // Cross Button / Button A -> ফায়ার সিস্টেম ম্যাপ (অপশনাল বাটন কম্ব্যাট)
                      gamepad.buttonA.pressedChangedHandler = { [weak self] (_, _, isPressed) in
                          if isPressed && (self?.ammo ?? 0) > 0 && (self?.canShoot ?? false) {
                              DispatchQueue.main.async { self?.fireBullet() }
                              ControllerInput.shared.triggerButtonHaptic(intensity: 0.8)
                          }
                      }
                  }
              }

              private func setupScene() {
                  scnView = SCNView(frame: view.bounds)
                  scnView.autoresizingMask        = [.flexibleWidth, .flexibleHeight]
                  scnView.backgroundColor         = UIColor(red: 0.02, green: 0.01, blue: 0.02, alpha: 1)
                  scnView.antialiasingMode         = .multisampling4X
                  scnView.preferredFramesPerSecond = 60
                  view.addSubview(scnView)

                  scene = SCNScene()
                  scene.background.contents        = UIColor(red: 0.04, green: 0.03, blue: 0.07, alpha: 1)
                  scene.physicsWorld.contactDelegate = self
                  scene.physicsWorld.gravity          = SCNVector3(0, -12, 0)
                  scnView.scene    = scene
                  scnView.delegate = self
                  scnView.isPlaying = true
              }

              private func buildWorld() {
                  buildGround()
                  buildBorders()
                  buildBuildings()
              }

              private func buildGround() {
                  let geo = SCNFloor()
                  let mat = SCNMaterial()
                  mat.diffuse.contents   = UIColor(red: 0.18, green: 0.17, blue: 0.22, alpha: 1)
                  mat.lightingModel      = .lambert
                  geo.materials = [mat]
                  let node = SCNNode(geometry: geo)
                  node.physicsBody = SCNPhysicsBody(type: .static, shape: nil)
                  node.physicsBody?.categoryBitMask  = PhysicsMask.ground
                  node.physicsBody?.collisionBitMask = PhysicsMask.player | PhysicsMask.enemy | PhysicsMask.bullet
                  scene.rootNode.addChildNode(node)
              }

              private func buildBorders() {
                  let h: Float = 8, t: Float = 1.5, s = mapHalf * 2
                  let walls = [
                      (Float(0), -mapHalf, s, t),
                      (Float(0),  mapHalf, s, t),
                      (-mapHalf, Float(0), t, s),
                      ( mapHalf, Float(0), t, s)
                  ]
                  for w in walls {
                      let box = SCNBox(width: CGFloat(w.2), height: CGFloat(h), length: CGFloat(w.3), chamferRadius: 0)
                      let mat = SCNMaterial()
                      mat.diffuse.contents = UIColor(white: 0.12, alpha: 1)
                      box.materials = [mat]
                      let node = SCNNode(geometry: box)
                      node.position = SCNVector3(w.0, h / 2, w.1)
                      node.physicsBody = SCNPhysicsBody(type: .static, shape: SCNPhysicsShape(geometry: box, options: nil))
                      node.physicsBody?.categoryBitMask = PhysicsMask.wall
                      scene.rootNode.addChildNode(node)
                  }
              }

              private func buildBuildings() {
                  let positions: [(Float, Float)] = [(-12, -12), (12, -12), (-12, 12), (12, 12)]
                  for pos in positions {
                      let box = SCNBox(width: 5, height: 14, length: 5, chamferRadius: 0)
                      let mat = SCNMaterial()
                      mat.diffuse.contents = UIColor(white: 0.16, alpha: 1)
                      box.materials = [mat]
                      let node = SCNNode(geometry: box)
                      node.position = SCNVector3(pos.0, 7, pos.1)
                      node.physicsBody = SCNPhysicsBody(type: .static, shape: SCNPhysicsShape(geometry: box, options: nil))
                      node.physicsBody?.categoryBitMask = PhysicsMask.wall
                      scene.rootNode.addChildNode(node)
                  }
              }

              private func spawnPlayer() {
                  playerNode = SCNNode()
                  playerNode.position = SCNVector3(0, 0, 0)
                  
                  let cap = SCNCapsule(capRadius: 0.45, height: 1.8)
                  let mat = SCNMaterial()
                  mat.diffuse.contents = UIColor.cyan
                  cap.materials = [mat]
                  playerBody = SCNNode(geometry: cap)
                  playerBody.position = SCNVector3(0, 0.9, 0)
                  playerNode.addChildNode(playerBody)
                  
                  let gun = SCNBox(width: 0.16, height: 0.16, length: 0.75, chamferRadius: 0)
                  let gunMat = SCNMaterial()
                  gunMat.diffuse.contents = UIColor.lightGray
                  gun.materials = [gunMat]
                  let gunNode = SCNNode(geometry: gun)
                  gunNode.position = SCNVector3(0.22, 1.0, -0.45)
                  playerBody.addChildNode(gunNode)

                  let shape = SCNPhysicsShape(geometry: cap, options: nil)
                  playerNode.physicsBody = SCNPhysicsBody(type: .dynamic, shape: shape)
                  playerNode.physicsBody?.isAngularVelocityFactor = SCNVector3(0, 0, 0)
                  playerNode.physicsBody?.categoryBitMask = PhysicsMask.player
                  playerNode.physicsBody?.collisionBitMask = PhysicsMask.wall | PhysicsMask.ground
                  playerNode.physicsBody?.contactTestBitMask = PhysicsMask.enemy
                  scene.rootNode.addChildNode(playerNode)
              }

              private func setupCamera() {
                  cameraArm = SCNNode()
                  cameraArm.position = playerNode.position
                  scene.rootNode.addChildNode(cameraArm)
                  
                  cameraNode = SCNNode()
                  cameraNode.camera = SCNCamera()
                  cameraNode.camera?.zNear = 1.0
                  cameraNode.camera?.zFar = 160.0
                  cameraNode.position = SCNVector3(0, 19, 15)
                  cameraNode.eulerAngles = SCNVector3(cameraPitch, 0, 0)
                  cameraArm.addChildNode(cameraNode)
              }

              private func setupLighting() {
                  let ambient = SCNLight()
                  ambient.type = .ambient
                  ambient.color = UIColor(white: 0.20, alpha: 1)
                  let ambNode = SCNNode()
                  ambNode.light = ambient
                  scene.rootNode.addChildNode(ambNode)
                  
                  let omni = SCNLight()
                  omni.type = .omni
                  omni.color = UIColor(white: 0.85, alpha: 1)
                  let omniNode = SCNNode()
                  omniNode.light = omni
                  omniNode.position = SCNVector3(0, 30, 0)
                  scene.rootNode.addChildNode(omniNode)
              }

              private func setupHUD() {
                  hudView = HUDOverlay(frame: view.bounds)
                  hudView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(hudView)
              }

              private func performWeaponReload() {
                  guard !isReloading && totalAmmo > 0 && ammo < 30 else { return }
                  isReloading = true
                  hudView.update(health: health, maxHealth: maxHealth, ammo: ammo, totalAmmo: totalAmmo, score: score, wave: wave, isReloading: true)
                  
                  DispatchQueue.main.asyncAfter(deadline: .now() + 1.4) { [weak self] in
                      guard let self = self else { return }
                      let needed = 30 - self.ammo
                      let transfer = min(needed, self.totalAmmo)
                      self.ammo += transfer
                      self.totalAmmo -= transfer
                      self.isReloading = false
                      self.hudView.update(health: self.health, maxHealth: self.maxHealth, ammo: self.ammo, totalAmmo: self.totalAmmo, score: self.score, wave: self.wave, isReloading: false)
                  }
              }

              func renderer(_ renderer: SCNSceneRenderer, updateAtTime time: TimeInterval) {
                  guard isGameStarted && !isGameOver else { return }
                  if lastTime == 0 { lastTime = time }
                  let dt = Float(time - lastTime)
                  lastTime = time

                  // ডুয়াল ভার্চুয়াল জয়স্টিক ভেক্টর থেকে ডেটা রিড করা হচ্ছে
                  let moveVec = hardwareMoveVector
                  let aimVec = hardwareAimVector

                  let moveLength = sqrt(moveVec.x * moveVec.x + moveVec.y * moveVec.y)
                  if moveLength > 0.1 {
                      let speed: Float = 6.5
                      let vel = SCNVector3(moveVec.x * speed, playerNode.physicsBody?.velocity.y ?? 0, moveVec.y * speed)
                      playerNode.physicsBody?.velocity = vel
                  } else {
                      playerNode.physicsBody?.velocity.x = 0
                      playerNode.physicsBody?.velocity.z = 0
                  }

                  let aimLength = sqrt(aimVec.x * aimVec.x + aimVec.y * aimVec.y)
                  if aimLength > 0.1 {
                      playerBody.eulerAngles.y = atan2(aimVec.x, aimVec.y)
                      // Twin-Stick শুটার মেকানিক্স: ডান জয়স্টিক ঘোরানো মাত্রই অটো-ফায়ার একটিভেট হবে
                      if time - lastShotTime > 0.16 && ammo > 0 && !isReloading {
                          lastShotTime = time
                          DispatchQueue.main.async { self.fireBullet() }
                      }
                  } else if moveLength > 0.1 {
                      playerBody.eulerAngles.y = atan2(moveVec.x, moveVec.y)
                  }

                  cameraArm.position = playerNode.position

                  updateWaveAndEnemies(time: time, dt: dt)
                  bullets = bullets.filter { $0.parent != nil }
              }

              private func updateWaveAndEnemies(time: TimeInterval, dt: Float) {
                  if !waveActive {
                      waveTimer -= TimeInterval(dt)
                      if waveTimer <= 0 {
                          wave += 1
                          waveActive = true
                          bossSpawned = false
                          DispatchQueue.main.async {
                              self.hudView.showMessage("PHASE \(self.wave) INITIATED", color: .cyan)
                              self.spawnWaveEnemies()
                          }
                      }
                  }

                  enemies = enemies.filter { $0.parent != nil && $0.isAlive }

                  let pPos = playerNode.position
                  for e in enemies {
                      e.moveToward(target: pPos, dt: dt)
                      if e.distanceTo(pPos) <= e.kind.attackRange {
                          if e.canAttack(at: time) {
                              e.lastAttackTime = time
                              DispatchQueue.main.async { self.playerTakeDamage(e.kind.damage) }
                          }
                      }
                  }

                  if waveActive && enemies.isEmpty {
                      waveActive = false
                      waveTimer = 4.0
                      DispatchQueue.main.async {
                          self.totalAmmo += 60
                          self.hudView.showMessage("PHASE CLEAR // SUPPLY REPLENISHED", color: .green)
                          self.hudView.update(health: self.health, maxHealth: self.maxHealth, ammo: self.ammo, totalAmmo: self.totalAmmo, score: self.score, wave: self.wave, isReloading: self.isReloading)
                      }
                  }
              }

              private func spawnWaveEnemies() {
                  let count = wave * 3 + 3
                  let kinds: [EnemyKind] = [.walker, .runner, .cultist, .brute]
                  for i in 0..<count {
                      let angle = Float(i) * (.pi * 2 / Float(count))
                      let r: Float = 24.0
                      let kind = (wave >= 3 && i == 0) ? .brute : kinds.randomElement() ?? .walker
                      let enemy = EnemyNode(kind: kind)
                      enemy.position = SCNVector3(cos(angle) * r, 0, sin(angle) * r)
                      scene.rootNode.addChildNode(enemy)
                      enemies.append(enemy)
                  }
                  
                  if wave % 3 == 0 && !bossSpawned {
                      bossSpawned = true
                      let boss = EnemyNode(kind: .boss)
                      boss.position = SCNVector3(0, 0, -22)
                      scene.rootNode.addChildNode(boss)
                      enemies.append(boss)
                  }
              }

              private func fireBullet() {
                  guard ammo > 0 else { return }
                  ammo -= 1
                  hudView.update(health: health, maxHealth: maxHealth, ammo: ammo, totalAmmo: totalAmmo, score: score, wave: wave, isReloading: isReloading)

                  let bGeo = SCNSphere(radius: 0.16)
                  let bMat = SCNMaterial()
                  bMat.diffuse.contents = UIColor.cyan
                  bMat.emission.contents = UIColor.cyan
                  bMat.lightingModel = .constant
                  bGeo.materials = [bMat]

                  let bNode = SCNNode(geometry: bGeo)
                  bNode.position = playerNode.position
                  bNode.position.y += 1.0

                  let angle = playerBody.eulerAngles.y
                  let speed: Float = 26.0
                  let vx = sin(angle) * speed
                  let vz = cos(angle) * speed

                  let shape = SCNPhysicsShape(geometry: bGeo, options: nil)
                  bNode.physicsBody = SCNPhysicsBody(type: .dynamic, shape: shape)
                  bNode.physicsBody?.categoryBitMask = PhysicsMask.bullet
                  bNode.physicsBody?.collisionBitMask = PhysicsMask.wall
                  bNode.physicsBody?.contactTestBitMask = PhysicsMask.enemy | PhysicsMask.wall
                  bNode.physicsBody?.velocity = SCNVector3(vx, 0, vz)

                  scene.rootNode.addChildNode(bNode)
                  bullets.append(bNode)

                  bNode.runAction(SCNAction.sequence([
                      SCNAction.wait(duration: 1.4),
                      SCNAction.removeFromParentNode()
                  ]))
              }

              private func playerTakeDamage(_ amt: Float) {
                  guard !isGameOver else { return }
                  health -= amt
                  hudView.update(health: health, maxHealth: maxHealth, ammo: ammo, totalAmmo: totalAmmo, score: score, wave: wave, isReloading: isReloading)
                  if health <= 0 { triggerGameOver() }
              }

              private func triggerGameOver() {
                  isGameOver = true
                  playerNode.physicsBody = nil
                  hudView.showMessage("SYSTEM FAILURE // GAME OVER", color: .red, duration: 8.0)
              }

              func physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact) {
                  let maskA = contact.nodeA.physicsBody?.categoryBitMask ?? 0
                  let maskB = contact.nodeB.physicsBody?.categoryBitMask ?? 0

                  var bulletNode: SCNNode?
                  var enemyNode: EnemyNode?

                  if maskA == PhysicsMask.bullet && maskB == PhysicsMask.enemy {
                      bulletNode = contact.nodeA
                      enemyNode = contact.nodeB as? EnemyNode
                  } else if maskB == PhysicsMask.bullet && maskA == PhysicsMask.enemy {
                      bulletNode = contact.nodeB
                      enemyNode = contact.nodeA as? EnemyNode
                  }

                  if let b = bulletNode, let e = enemyNode {
                      b.removeFromParentNode()
                      DispatchQueue.main.async {
                          if e.isAlive {
                              e.takeDamage(35)
                              if !e.isAlive {
                                  self.score += e.kind.scoreValue
                                  self.hudView.update(health: self.health, maxHealth: self.maxHealth, ammo: self.ammo, totalAmmo: self.totalAmmo, score: self.score, wave: self.wave, isReloading: self.isReloading)
                              }
                          }
                      }
                  }
              }
          }
          SWIFT_EOF

      # ── Configuration Files ──────────────────────────────────────────────────
      - name: Create project.yml for XcodeGen
        run: |
          cat > project.yml << 'EOF'
          name: SV3D
          options:
            bundleIdPrefix: com.shadowvillage
          targets:
            SV3D:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources: [SV3D/Sources]
              settings:
                INFOPLIST_FILE: SV3D/Sources/Info.plist
                PRODUCT_BUNDLE_IDENTIFIER: com.shadowvillage.sv3d
                DEVELOPMENT_TEAM: ""
                CODE_SIGNING_ALLOWED: NO
                CODE_SIGN_STYLE: Automatic
          EOF

      - name: Create Info.plist
        run: |
          cat > SV3D/Sources/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>$(PRODUCT_BUNDLE_PACKAGE_TYPE)</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSupportsIndirectInputEvents</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string></string>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~iphone</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

      # ── Project Build Pipeline ───────────────────────────────────────────────
      - name: Generate Xcode Project File
        run: xcodegen generate

      - name: Build Application and Archive
        run: |
          xcodebuild archive \
            -project SV3D.xcodeproj \
            -scheme SV3D \
            -configuration Release \
            -archivePath build/SV3D.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" | xcpretty

      - name: Package App Package (Payload IPA)
        run: |
          mkdir -p build/Export/Payload
          cp -R build/SV3D.xcarchive/Products/Applications/SV3D.app build/Export/Payload/
          cd build/Export
          zip -r ../../ShadowVillage3D.ipa Payload
          cd ../..

      - name: Upload Finished Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowVillage3D-iOS-Build
          path: ShadowVillage3D.ipa
