name: 🎮 Shadow Village 3D – GTA Style Open World Zombie

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Export IPA
    runs-on: macos-14
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Install Build Tools
        run: |
          brew install xcodegen
          gem install xcpretty --no-document 2>/dev/null || true

      - name: Create Project Directories
        run: |
          mkdir -p GameHub/Sources/Input
          mkdir -p GameHub/Sources

      # ── AppDelegate ──────────────────────────────────────────────────────────
      - name: Create AppDelegate.swift
        run: |
          cat << 'EOF' > GameHub/Sources/AppDelegate.swift
          import UIKit
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(
                  _ application: UIApplication,
                  didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
              ) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = GameViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

      # ── Input System: PS5 DualSense Virtual Controller ───────────────────────
      - name: Write Input Controller System
        run: |
          cat << 'EOF' > GameHub/Sources/Input/ControllerInput.swift
          import GameController
          import CoreHaptics
          import Foundation

          class ControllerInput: ObservableObject {
              static let shared = ControllerInput()
              
              @Published var leftStick: CGPoint = .zero
              @Published var rightStick: CGPoint = .zero
              @Published var pressedButtons: Set<String> = []
              
              private var hapticEngine: CHHapticEngine?
              private var gcController: GCVirtualController?
              
              private init() {
                  setupHaptics()
                  setupVirtualController()
              }
              
              private func setupVirtualController() {
                  let config = GCVirtualController.Configuration()
                  config.elements = [
                      GCInputLeftThumbstick,
                      GCInputRightThumbstick,
                      GCInputButtonA,
                      GCInputButtonB,
                      GCInputButtonX,
                      GCInputButtonY
                  ]
                  
                  gcController = GCVirtualController(configuration: config)
                  gcController?.connect { [weak self] error in
                      if let error = error {
                          print("Failed to connect virtual controller: \(error.localizedDescription)")
                          return
                      }
                      self?.setupInputHandlers()
                  }
              }
              
              private func setupInputHandlers() {
                  guard let controller = GCController.controllers().first?.extendedGamepad else { return }
                  
                  controller.leftThumbstick.valueChangedHandler = { [weak self] _, x, y in
                      DispatchQueue.main.async {
                          self?.leftStick = CGPoint(x: CGFloat(x), y: CGFloat(y))
                      }
                  }
                  
                  controller.rightThumbstick.valueChangedHandler = { [weak self] _, x, y in
                      DispatchQueue.main.async {
                          self?.rightStick = CGPoint(x: CGFloat(x), y: CGFloat(y))
                      }
                  }
                  
                  let buttonMap: [String: GCControllerButtonInput] = [
                      "Cross": controller.buttonA,
                      "Circle": controller.buttonB,
                      "Square": controller.buttonX,
                      "Triangle": controller.buttonY
                  ]
                  
                  for (name, buttonInput) in buttonMap {
                      buttonInput.valueChangedHandler = { [weak self] _, _, isPressed in
                          DispatchQueue.main.async {
                              if isPressed {
                                  self?.pressedButtons.insert(name)
                                  self?.triggerButtonHaptic()
                              } else {
                                  self?.pressedButtons.remove(name)
                              }
                          }
                      }
                  }
              }
              
              private func setupHaptics() {
                  guard CHHapticEngine.capabilitiesForHardware().supportsHaptics else { return }
                  hapticEngine = try? CHHapticEngine()
                  try? hapticEngine?.start()
              }
              
              func triggerButtonHaptic(intensity: Float = 0.7) {
                  guard let engine = hapticEngine else { return }
                  let event = CHHapticEvent(
                      eventType: .hapticTransient,
                      parameters: [
                          CHHapticEventParameter(parameterID: .hapticIntensity, value: intensity),
                          CHHapticEventParameter(parameterID: .hapticSharpness, value: 0.5)
                      ],
                      relativeTime: 0
                  )
                  guard let pattern = try? CHHapticPattern(events: [event], parameters: []) else { return }
                  let player = try? engine.makePlayer(with: pattern)
                  try? player?.start(atTime: CHHapticTimeImmediate)
              }
          }
          EOF

      # ── Types ────────────────────────────────────────────────────────────────
      - name: Create Types.swift
        run: |
          cat << 'EOF' > GameHub/Sources/Types.swift
          import UIKit
          struct PhysicsMask {
              static let none:   Int = 0
              static let player: Int = 1 << 0
              static let enemy:  Int = 1 << 1
              static let bullet: Int = 1 << 2
              static let wall:   Int = 1 << 3
              static let ground: Int = 1 << 4
          }
          enum CivilianGender {
              case man, women
          }
          EOF

      # ── HUDOverlay ───────────────────────────────────────────────────────────
      - name: Create HUDOverlay.swift
        run: |
          cat << 'EOF' > GameHub/Sources/HUDOverlay.swift
          import UIKit
          class HUDOverlay: UIView {
              private let hpBg      = UIView()
              private let hpBar     = UIView()
              private let ammoLbl   = UILabel()
              private let scoreLbl  = UILabel()
              private let msgLbl    = UILabel()
              let renewBtn  = UIButton(type: .system)
              let barW: CGFloat = 220
              
              var onRenewPressed: (() -> Void)?

              override init(frame: CGRect) {
                  super.init(frame: frame)
                  buildUI()
              }
              required init?(coder: NSCoder) { fatalError() }
              
              private func customFont(_ size: CGFloat, bold: Bool = false) -> UIFont {
                  return bold ? UIFont.systemFont(ofSize: size, weight: .bold) : UIFont.systemFont(ofSize: size, weight: .regular)
              }
              
              private func buildUI() {
                  hpBg.frame            = CGRect(x: 20, y: 20, width: barW + 4, height: 14)
                  hpBg.backgroundColor  = UIColor(white: 0.05, alpha: 0.6)
                  hpBg.layer.cornerRadius = 7
                  hpBg.layer.borderColor = UIColor(white: 1.0, alpha: 0.15).cgColor
                  hpBg.layer.borderWidth = 1
                  addSubview(hpBg)
                  
                  hpBar.frame             = CGRect(x: 22, y: 22, width: barW, height: 10)
                  hpBar.backgroundColor   = UIColor(red: 0.00, green: 0.90, blue: 0.45, alpha: 1.0)
                  hpBar.layer.cornerRadius = 5
                  addSubview(hpBar)
                  
                  scoreLbl.frame            = CGRect(x: bounds.width - 240, y: 20, width: 220, height: 26)
                  scoreLbl.autoresizingMask = [.flexibleLeftMargin]
                  scoreLbl.text             = "WANTED // $000000"
                  scoreLbl.textColor        = .yellow
                  scoreLbl.font             = customFont(16, bold: true)
                  scoreLbl.textAlignment    = .right
                  addSubview(scoreLbl)
                  
                  ammoLbl.frame            = CGRect(x: bounds.width - 200, y: bounds.height - 65, width: 180, height: 45)
                  ammoLbl.autoresizingMask = [.flexibleLeftMargin, .flexibleTopMargin]
                  ammoLbl.text             = "AMMO: ∞"
                  ammoLbl.textColor        = UIColor(red: 1.0, green: 0.3, blue: 0.0, alpha: 1.0)
                  ammoLbl.font             = customFont(26, bold: true)
                  ammoLbl.textAlignment    = .right
                  addSubview(ammoLbl)
                  
                  msgLbl.frame            = CGRect(x: 0, y: bounds.height * 0.35, width: bounds.width, height: 50)
                  msgLbl.autoresizingMask = [.flexibleWidth, .flexibleTopMargin, .flexibleBottomMargin]
                  msgLbl.textColor        = .white
                  msgLbl.font             = customFont(24, bold: true)
                  msgLbl.textAlignment    = .center
                  msgLbl.alpha            = 0
                  addSubview(msgLbl)
                  
                  renewBtn.frame = CGRect(x: bounds.width/2 - 120, y: bounds.height * 0.55, width: 240, height: 50)
                  renewBtn.autoresizingMask = [.flexibleLeftMargin, .flexibleRightMargin, .flexibleTopMargin, .flexibleBottomMargin]
                  renewBtn.setTitle("RESPAWN (RENEW CHARACTER)", for: .normal)
                  renewBtn.titleLabel?.font = customFont(14, bold: true)
                  renewBtn.setTitleColor(.black, for: .normal)
                  renewBtn.backgroundColor = .white
                  renewBtn.layer.cornerRadius = 4
                  renewBtn.isHidden = true
                  renewBtn.addTarget(self, action: #selector(renewTapped), for: .touchUpInside)
                  addSubview(renewBtn)
              }
              
              @objc private func renewTapped() {
                  onRenewPressed?()
              }
              
              func update(health: Float, maxHealth: Float, score: Int) {
                  let ratio = CGFloat(max(0, health / maxHealth))
                  UIView.animate(withDuration: 0.15) { self.hpBar.frame.size.width = self.barW * ratio }
                  hpBar.backgroundColor = ratio > 0.5 ? .green : (ratio > 0.25 ? .orange : .red)
                  scoreLbl.text = String(format: "WANTED // $%06d", score)
              }
              
              func showMessage(_ text: String, color: UIColor = .white, duration: TimeInterval = 2.0) {
                  msgLbl.text      = text.uppercased()
                  msgLbl.textColor = color
                  msgLbl.alpha     = 1
                  if duration > 0 {
                      UIView.animate(withDuration: 0.3, delay: duration) { self.msgLbl.alpha = 0 }
                  }
              }
              
              func clearMessage() { msgLbl.alpha = 0 }
          }
          EOF

      # ── EnemyNode (GTA Zombie Citizen) ───────────────────────────────────────
      - name: Create EnemyNode.swift
        run: |
          cat << 'EOF' > GameHub/Sources/EnemyNode.swift
          import SceneKit
          import UIKit

          class EnemyNode: SCNNode {
              let gender: CivilianGender
              var hp: Float = 100.0
              var isAlive = true
              var lastAttackTime: TimeInterval = 0
              
              // ওপেন ওয়ার্ল্ড রোমিং ভ্যারিয়েবল (পাবলিকের মতো রাস্তায় হাঁটার জন্য)
              private var roamTarget: SCNVector3 = .zero
              private var isChasing = false
              private var speed: Float = 1.8
              
              init(gender: CivilianGender) {
                  self.gender = gender
                  super.init()
                  buildHumanMesh()
                  buildPhysics()
                  generateNewRoamTarget()
              }
              
              required init?(coder: NSCoder) { fatalError() }
              
              private func buildHumanMesh() {
                  // GTA স্টাইল ম্যান এবং ওমেন বডি স্ট্রাকচার ডিফাইন
                  let bodyRadius: CGFloat = gender == .man ? 0.35 : 0.28
                  let bodyHeight: CGFloat = gender == .man ? 1.6 : 1.45
                  
                  let torso = SCNCapsule(capRadius: bodyRadius, height: bodyHeight)
                  let mat = SCNMaterial()
                  // জম্বি পাবলিকের মতো দেখানোর জন্য ক্লোথিং কালার ভ্যারিয়েশন
                  mat.diffuse.contents = gender == .man ? UIColor.darkGray : UIColor(red: 0.7, green: 0.3, blue: 0.4, alpha: 1)
                  mat.lightingModel = .lambert
                  torso.materials = [mat]
                  
                  let bodyNode = SCNNode(geometry: torso)
                  bodyNode.position = SCNVector3(0, bodyHeight / 2, 0)
                  addChildNode(bodyNode)
                  
                  // মাথা (Head)
                  let headGeo = SCNSphere(radius: 0.22)
                  let headMat = SCNMaterial()
                  headMat.diffuse.contents = UIColor(red: 0.4, green: 0.5, blue: 0.4, alpha: 1) // সামান্য গ্রীনিশ জম্বি স্কিন
                  headGeo.materials = [headMat]
                  let headNode = SCNNode(geometry: headGeo)
                  headNode.position = SCNVector3(0, bodyHeight, 0)
                  addChildNode(headNode)
              }
              
              private func buildPhysics() {
                  let shape = SCNPhysicsShape(geometry: SCNCapsule(capRadius: 0.35, height: 1.6), options: nil)
                  let body = SCNPhysicsBody(type: .kinematic, shape: shape)
                  body.categoryBitMask = PhysicsMask.enemy
                  body.contactTestBitMask = PhysicsMask.bullet | PhysicsMask.player
                  physicsBody = body
              }
              
              private func generateNewRoamTarget() {
                  // ওপেন ওয়ার্ল্ডে পাবলিকের মতো এদিক সেদিক র্যান্ডম লোকেশনে হাঁটার টার্গেট
                  let range: Float = 35.0
                  roamTarget = SCNVector3(Float.random(in: -range...range), 0.5, Float.random(in: -range...range))
                  speed = Float.random(in: 0.9...1.6) // হাঁটার নরমাল স্পিড
              }
              
              func updateAI(playerPosition: SCNVector3, dt: Float) {
                  guard isAlive else { return }
                  
                  let dx = playerPosition.x - position.x
                  let dz = playerPosition.z - position.z
                  let distToPlayer = sqrt(dx * dx + dz * dz)
                  
                  // প্লেয়ার কাছে আসলে পাবলিক জম্বি হয়ে চেজ (Chasing) শুরু করবে
                  if distToPlayer < 9.0 {
                      isChasing = true
                      speed = gender == .runner ? 4.0 : 2.8 // তাড়া করার সময় স্পিড বেড়ে যাবে
                      
                      let angle = atan2(dx, dz)
                      eulerAngles.y = angle
                      
                      if distToPlayer > 1.1 {
                          position.x += (dx / distToPlayer) * speed * dt
                          position.z += (dz / distToPlayer) * speed * dt
                      }
                  } else {
                      // প্লেয়ার দূরে থাকলে নরমাল সিভিলিয়ার বা পাবলিকের মতো রাস্তায় ঘুরে বেড়াবে
                      if isChasing {
                          isChasing = false
                          generateNewRoamTarget()
                      }
                      
                      let rDx = roamTarget.x - position.x
                      let rDz = roamTarget.z - position.z
                      let roamDist = sqrt(rDx * rDx + rDz * rDz)
                      
                      if roamDist < 1.0 {
                          generateNewRoamTarget()
                      } else {
                          eulerAngles.y = atan2(rDx, rDz)
                          position.x += (rDx / roamDist) * speed * dt
                          position.z += (rDz / roamDist) * speed * dt
                      }
                  }
              }
              
              func takeDamage(_ amount: Float) {
                  guard isAlive else { return }
                  hp -= amount
                  if hp <= 0 {
                      isAlive = false
                      physicsBody = nil
                      runAction(SCNAction.sequence([
                          SCNAction.group([
                              SCNAction.rotateBy(x: .pi/2, y: 0, z: 0, duration: 0.3),
                              SCNAction.fadeOut(duration: 0.5)
                          ]),
                          SCNAction.removeFromParentNode()
                      ]))
                  }
              }
          }
          extension EnemyKind {
              static var runner: CivilianGender { return .women }
          }
          EOF

      # ── GameViewController ──────────────────────────────────────────────────
      - name: Create GameViewController.swift
        run: |
          cat << 'EOF' > GameHub/Sources/GameViewController.swift
          import UIKit
          import SceneKit

          class GameViewController: UIViewController, SCNSceneRendererDelegate, SCNPhysicsContactDelegate {
              
              private var sceneView: SCNView!
              private var scene: SCNScene!
              private var hud: HUDOverlay!
              
              private var playerNode: SCNNode!
              private var cameraNode: SCNNode!
              private var citizens: [EnemyNode] = []
              
              private var wantedLevel = 0
              private var playerHP: Float = 100.0
              private let maxPlayerHP: Float = 100.0
              private var isGameOver = false
              
              private var lastFireTime: TimeInterval = 0
              private let fireRate: TimeInterval = 0.12
              private var lastUpdateTime: TimeInterval = 0
              private let input = ControllerInput.shared
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  
                  setupEngine()
                  setupOpenWorldMaps()
                  setupHumanPlayer()
                  setupHUD()
                  
                  spawnWorldPopulation(count: 35) // একসাথে ৩৫ জন পাবলিক রাস্তায় লাইভ ঘুরবে
              }
              
              override var prefersStatusBarHidden: Bool { return true }
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { return .landscape }
              
              private func setupEngine() {
                  sceneView = SCNView(frame: view.bounds)
                  sceneView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  sceneView.backgroundColor = .black
                  sceneView.delegate = self
                  sceneView.isPlaying = true
                  view.addSubview(sceneView)
                  
                  scene = SCNScene()
                  scene.physicsWorld.gravity = SCNVector3(0, -9.8, 0)
                  scene.physicsWorld.contactDelegate = self
                  sceneView.scene = scene
              }
              
              private func setupOpenWorldMaps() {
                  // রিয়েলস্টিক গোধূলি/বিকেলের আবহাওয়া ও ক্লিয়ার ভিজিবিলিটি লাইটিং
                  let ambLight = SCNLight()
                  ambLight.type = .ambient
                  ambLight.color = UIColor(white: 0.35, alpha: 1.0)
                  let ambNode = SCNNode()
                  ambNode.light = ambLight
                  scene.rootNode.addChildNode(ambNode)
                  
                  let sunLight = SCNLight()
                  sunLight.type = .directional
                  sunLight.color = UIColor(red: 0.95, green: 0.85, blue: 0.75, alpha: 1.0) // বিকেলের রোদের কালার টোন
                  sunLight.intensity = 1200
                  sunLight.castsShadow = true
                  let sunNode = SCNNode()
                  sunNode.light = sunLight
                  sunNode.position = SCNVector3(20, 35, 10)
                  sunNode.look(at: SCNVector3(0, 0, 0))
                  scene.rootNode.addChildNode(sunNode)
                  
                  // GTA স্টাইল গ্রাউন্ড বা রাস্তা
                  let floorGeo = SCNFloor()
                  floorGeo.reflectivity = 0.02
                  let floorMat = SCNMaterial()
                  floorMat.diffuse.contents = UIColor(white: 0.2, alpha: 1.0) // পিচ ঢালা রাস্তার কালার
                  floorGeo.materials = [floorMat]
                  let floorNode = SCNNode(geometry: floorGeo)
                  floorNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)
                  floorNode.physicsBody?.categoryBitMask = PhysicsMask.ground
                  scene.rootNode.addChildNode(floorNode)
              }
              
              private func setupHumanPlayer() {
                  // মেইন ক্যারেক্টার এখন প্রোপার হিউম্যান ম্যান (Man Character)
                  let bodyGeo = SCNCapsule(capRadius: 0.38, height: 1.75)
                  let bodyMat = SCNMaterial()
                  bodyMat.diffuse.contents = UIColor.blue // ব্লু জিন্স/শার্ট কালার ফিল
                  bodyGeo.materials = [bodyMat]
                  
                  playerNode = SCNNode(geometry: bodyGeo)
                  playerNode.position = SCNVector3(0, 0.875, 0)
                  
                  let head = SCNNode(geometry: SCNSphere(radius: 0.23))
                  head.position = SCNVector3(0, 1.75, 0)
                  head.geometry?.firstMaterial?.diffuse.contents = UIColor(red: 0.95, green: 0.8, blue: 0.65, alpha: 1) // হিউম্যান স্কিন
                  playerNode.addChildNode(head)
                  
                  let pBody = SCNPhysicsBody(type: .dynamic, shape: SCNPhysicsShape(geometry: bodyGeo, options: nil))
                  pBody.allowsResting = false
                  pBody.angularVelocityFactor = SCNVector3(0, 0, 0) // ফিজিক্স রোটেশন লক
                  pBody.categoryBitMask = PhysicsMask.player
                  pBody.collisionBitMask = PhysicsMask.wall | PhysicsMask.ground | PhysicsMask.enemy
                  pBody.contactTestBitMask = PhysicsMask.enemy
                  playerNode.physicsBody = pBody
                  scene.rootNode.addChildNode(playerNode)
                  
                  cameraNode = SCNNode()
                  cameraNode.camera = SCNCamera()
                  cameraNode.position = SCNVector3(0, 16, 11)
                  cameraNode.look(at: playerNode.position)
                  scene.rootNode.addChildNode(cameraNode)
              }
              
              private func spawnWorldPopulation(count: Int) {
                  for _ in 0..<count {
                      let gender: CivilianGender = Bool.random() ? .man : .women
                      let citizen = EnemyNode(gender: gender)
                      
                      let spawnRadius = Float.random(in: 5...45)
                      let angle = Float.random(in: 0...(.pi * 2))
                      citizen.position = SCNVector3(sin(angle) * spawnRadius, 0.0, cos(angle) * spawnRadius)
                      
                      scene.rootNode.addChildNode(citizen)
                      citizens.append(citizen)
                  }
              }
              
              private func setupHUD() {
                  hud = HUDOverlay(frame: view.bounds)
                  hud.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  hud.onRenewPressed = { [weak self] in self?.renewGame() }
                  view.addSubview(hud)
                  hud.update(health: playerHP, maxHealth: maxPlayerHP, score: wantedLevel)
              }
              
              func renderer(_ renderer: SCNSceneRenderer, updateAtTime time: TimeInterval) {
                  if isGameOver { return }
                  
                  if lastUpdateTime == 0 { lastUpdateTime = time }
                  let dt = Float(time - lastUpdateTime)
                  lastUpdateTime = time
                  
                  // ১. বাম জয়স্টিক দিয়ে ক্যারেক্টার মুভমেন্ট
                  let lStick = input.leftStick
                  if lStick != .zero {
                      let runSpeed: Float = 7.5
                      let moveX = Float(lStick.x) * runSpeed
                      let moveZ = -Float(lStick.y) * runSpeed
                      
                      playerNode.physicsBody?.velocity = SCNVector3(moveX, playerNode.physicsBody?.velocity.y ?? 0, moveZ)
                      
                      // যদি ফাইট জয়স্টিক ইউজ না করা হয়, তবে যেদিকে যাচ্ছে সেদিকে ফেস করবে
                      if input.rightStick == .zero {
                          playerNode.eulerAngles.y = atan2(-moveX, -moveZ)
                      }
                  } else {
                      playerNode.physicsBody?.velocity.x = 0
                      playerNode.physicsBody?.velocity.z = 0
                  }
                  
                  // ২. ডান জয়স্টিক দিয়ে স্বাধীনভাবে ফাইট/শুট করা যাবে (Twin-Stick Combats)
                  let rStick = input.rightStick
                  if rStick != .zero {
                      playerNode.eulerAngles.y = atan2(-Float(rStick.x), Float(rStick.y))
                      if time - lastFireTime >= fireRate {
                          lastFireTime = time
                          executeShoot()
                      }
                  }
                  
                  // ক্যামেরা ফলো মেকানিজম
                  let targetCamPos = SCNVector3(playerNode.position.x, playerNode.position.y + 16, playerNode.position.z + 11)
                  cameraNode.position.x += (targetCamPos.x - cameraNode.position.x) * 0.1
                  cameraNode.position.z += (targetCamPos.z - cameraNode.position.z) * 0.1
                  
                  // ওপেন ওয়ার্ল্ড সিটিজেন জম্বি এআই আপডেট
                  citizens = citizens.filter { $0.parent != nil }
                  let pPos = playerNode.position
                  for citizen in citizens {
                      citizen.updateAI(playerPosition: pPos, dt: dt)
                      
                      // কলিশন বা ড্যামেজ ডিটেকশন
                      let dx = citizen.position.x - pPos.x
                      let dz = citizen.position.z - pPos.z
                      if sqrt(dx*dx + dz*dz) < 1.1 {
                          if time - citizen.lastAttackTime >= 1.5 {
                              citizen.lastAttackTime = time
                              playerHP = max(0, playerHP - 15)
                              DispatchQueue.main.async { [weak self] in
                                  guard let self = self else { return }
                                  self.hud.update(health: self.playerHP, maxHealth: self.maxPlayerHP, score: self.wantedLevel)
                              }
                              if playerHP <= 0 {
                                  isGameOver = true
                                  DispatchQueue.main.async { [weak self] in self?.triggerGameOver() }
                              }
                          }
                      }
                  }
                  
                  // ম্যাপ ফাঁকা হয়ে গেলে নতুন সিভিলিয়ার পপুলেশন লোড হবে স্বয়ংক্রিয়ভাবে
                  if citizens.count < 10 {
                      DispatchQueue.main.async { [weak self] in self?.spawnWorldPopulation(count: 20) }
                  }
              }
              
              private func executeShoot() {
                  let bullet = SCNNode(geometry: SCNSphere(radius: 0.12))
                  bullet.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow
                  bullet.geometry?.firstMaterial?.lightingModel = .constant
                  bullet.position = SCNVector3(playerNode.position.x, playerNode.position.y + 0.4, playerNode.position.z)
                  
                  let bBody = SCNPhysicsBody(type: .dynamic, shape: nil)
                  bBody.isAffectedByGravity = false
                  bBody.categoryBitMask = PhysicsMask.bullet
                  bBody.contactTestBitMask = PhysicsMask.enemy
                  bullet.physicsBody = bBody
                  
                  scene.rootNode.addChildNode(bullet)
                  
                  let angle = playerNode.eulerAngles.y
                  let speed: Float = 30.0
                  bBody.velocity = SCNVector3(-sin(angle) * speed, 0, -cos(angle) * speed)
                  
                  bullet.runAction(SCNAction.sequence([SCNAction.wait(duration: 1.2), SCNAction.removeFromParentNode()]))
              }
              
              private func triggerGameOver() {
                  hud.showMessage("WASTED // YOU DIED", color: .red, duration: 0)
                  hud.renewBtn.isHidden = false
              }
              
              private func renewGame() {
                  isGameOver = false
                  playerHP = maxPlayerHP
                  wantedLevel = 0
                  
                  for citizen in citizens { citizen.removeFromParentNode() }
                  citizens.removeAll()
                  
                  playerNode.position = SCNVector3(0, 0.875, 0)
                  playerNode.physicsBody?.velocity = SCNVector3(0, 0, 0)
                  
                  hud.renewBtn.isHidden = true
                  hud.clearMessage()
                  hud.update(health: playerHP, maxHealth: maxPlayerHP, score: wantedLevel)
                  
                  spawnWorldPopulation(count: 35)
              }
              
              func physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact) {
                  let maskA = contact.nodeA.physicsBody?.categoryBitMask ?? 0
                  let maskB = contact.nodeB.physicsBody?.categoryBitMask ?? 0
                  
                  if (maskA == PhysicsMask.bullet && maskB == PhysicsMask.enemy) {
                      handleBulletHit(bullet: contact.nodeA, enemy: contact.nodeB as? EnemyNode)
                  } else if (maskA == PhysicsMask.enemy && maskB == PhysicsMask.bullet) {
                      handleBulletHit(bullet: contact.nodeB, enemy: contact.nodeA as? EnemyNode)
                  }
              }
              
              private func handleBulletHit(bullet: SCNNode, enemy: EnemyNode?) {
                  bullet.removeFromParentNode()
                  if let e = enemy, e.isAlive {
                      e.takeDamage(50.0)
                      if !e.isAlive {
                          wantedLevel += Int.random(in: 100...250) // সিটিজেন জম্বি মারলে ক্যাশ/ওয়ান্টেড স্কোর বাড়বে
                          DispatchQueue.main.async { [weak self] in
                              guard let self = self else { return }
                              self.hud.update(health: self.playerHP, maxHealth: self.maxPlayerHP, score: self.wantedLevel)
                          }
                      }
                  }
              }
          }
          EOF

      # ── Project Configuration & Build System ─────────────────────────────────
      - name: Create project.yml
        run: |
          cat << 'EOF' > project.yml
          name: GameHub
          options:
            bundleIdPrefix: com.shadowvillage.game
          targets:
            GameHub:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources: [GameHub]
              settings:
                base:
                  INFOPLIST_FILE: GameHub/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.shadowvillage.game.gtaopenworld
                  PRODUCT_NAME: GameHub
                  MARKETING_VERSION: "1.0.0"
                  CURRENT_PROJECT_VERSION: "1"
                  TARGETED_DEVICE_FAMILY: "1,2"
                  ASSETCATALOG_COMPILER_APPICON_NAME: ""
                  ARCHS: "arm64"
                  SDKROOT: "iphoneos"
          EOF

      - name: Create Info.plist
        run: |
          cat << 'EOF' > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.shadowvillage.game.gtaopenworld</string>
              <key>CFBundleExecutable</key>
              <string>GameHub</string>
              <key>CFBundleName</key>
              <string>GameHub</string>
              <key>CFBundleDisplayName</key>
              <string>ZombieOpenWorld</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string></string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
                  <string>metal</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>GCSupportedGameControllers</key>
              <array>
                  <dict>
                      <key>ProfileName</key>
                      <string>ExtendedGamepad</string>
                  </dict>
              </array>
              <key>GCRequiresControllerUserInterface</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode Project File
        run: xcodegen generate

      - name: Archive Project for Real Device (No-Sign Method)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -archivePath build/GameHub.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

      - name: Package App Bundle into Installable IPA
        run: |
          mkdir -p build/IPA_Structure/Payload
          cp -R build/GameHub.xcarchive/Products/Applications/GameHub.app build/IPA_Structure/Payload/
          cd build/IPA_Structure
          zip -q -r ../ShadowVillage3D.ipa Payload
          cd ../..
          echo "=== GTA OPEN WORLD ZOMBIE IPA GENERATED SUCCESSFULLY ==="

      - name: Upload Artifact & Generate Direct Download Link
        uses: actions/upload-artifact@v4
        with:
          name: ShadowVillage3D-iOS-IPA
          path: build/ShadowVillage3D.ipa
          retention-days: 7
